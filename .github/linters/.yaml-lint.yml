extends: default

rules:
  line-length: disable
  indentation:
    spaces: 2
  truthy:
    allowed-values:
      - "true"
      - "false"
      - "on"
      - "off"
  document-start: disable
  comments:
    min-spaces-from-content: 1
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 0
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 0
