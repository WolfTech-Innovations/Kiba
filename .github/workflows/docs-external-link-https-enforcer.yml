name: Docs External Link HTTPS Enforcer
on:
  push:
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'
jobs:
  enforce-https:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Scan for http:// links
        run: |
          set -euo pipefail
          grep -rn "http://" . --include="*.md" | grep -v "http://localhost" && { echo "Error: Use HTTPS for all external links."; exit 1; } || echo "All links use HTTPS."
