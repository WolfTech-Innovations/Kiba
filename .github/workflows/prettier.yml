  push:
    timeout-minutes: 5
  pull_request:

jobs:
  prettier:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Run Prettier
        uses: creyD/prettier_action@v4.3
        with:
          prettier_options: --write **/*.{md,yml,yaml,json}
          commit_message: "style: prettier automated fix"
