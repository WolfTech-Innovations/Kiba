name: Prettier

on:
  push:
  pull_request:

jobs:
  prettier:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Run Prettier
        uses: creyD/prettier_action@31355f8eef017f8aeba2e0bc09d8502b13dbbad1
        with:
          prettier_options: --write **/*.{md,yml,yaml,json}
          commit_message: "style: prettier automated fix"
