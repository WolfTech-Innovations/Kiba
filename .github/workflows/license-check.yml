name: License Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check License Header
        uses: apache/skywalking-eyes@v0.6.0
        with:
          config: .github/licensing.yml
        continue-on-error: true # Might need configuration first
