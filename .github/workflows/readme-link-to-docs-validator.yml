name: README Docs Link Validator
on:
  push:
    paths:
      - 'README.md'
jobs:
  validate-links:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      name: Run actions/checkout
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check docs links
        run: |
          grep -oE '\./docs/[a-z0-9-]+\.md' README.md | while read -r link; do
            ls "$link" || { echo "Broken doc link in README: $link"; exit 1; }
          done
