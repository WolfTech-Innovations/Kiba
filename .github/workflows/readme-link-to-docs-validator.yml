  push:
    timeout-minutes: 5
    paths:
      - 'README.md'
jobs:
  validate-links:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check docs links
        run: |
          grep -oE '\./docs/[a-z0-9-]+\.md' README.md | while read -r link; do
            ls "$link" || { echo "Broken doc link in README: $link"; exit 1; }
          done
