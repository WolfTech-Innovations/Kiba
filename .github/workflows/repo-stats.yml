name: Repo Stats

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Fetch Stats
        run: |
          echo "Stars: $(curl -s https://api.github.com/repos/${{ github.repository }} | jq '.stargazers_count')"
