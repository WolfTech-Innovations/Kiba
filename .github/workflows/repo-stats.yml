name: Repo Stats

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  stats:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Stats
        run: |
          echo "Stars: $(curl -s https://api.github.com/repos/${{ github.repository }} | jq '.stargazers_count')"
