  push:
    timeout-minutes: 5
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
    timeout-minutes: 5
  pull-requests: write

jobs:
  update_release_draft:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@3f3747806509f6ee866a1a9e334a1a9e334a1a9e
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
