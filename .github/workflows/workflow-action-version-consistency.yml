name: Workflow Action Version Consistency
on:
  push:
    paths:
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'
jobs:
  audit-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Audit action versions
        run: |
          set -euo pipefail
          # Check for actions/checkout specifically as an example, excluding this audit file
          versions=$(grep -h "uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683" .github/workflows/*.yml | grep -v "grep" | sort | uniq)
          count=$(echo "$versions" | wc -l)
          if [ "$count" -gt 1 ]; then
            echo "Error: Multiple versions of actions/checkout found:"
            echo "$versions"
            exit 1
          fi
          echo "Action versions are consistent."
