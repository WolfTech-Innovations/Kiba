name: Docker Test

on:
  push:
    paths:
      - "build.sh"
  pull_request:
    paths:
      - "build.sh"

jobs:
  test-docker:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build Docker Image
        run: |
          docker build -t kibaos-builder -f- . <<EOF
          FROM debian:trixie
          RUN apt update && apt install -y live-build debootstrap xorriso git squashfs-tools
          EOF
