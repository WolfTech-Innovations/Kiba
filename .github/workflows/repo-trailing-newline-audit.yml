  push:
    timeout-minutes: 5
    paths:
      - '**.sh'
      - '**.md'
      - '**.yml'
jobs:
  check-newline:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Scan for missing trailing newline
        run: |
          find . -type f \( -name "*.sh" -o -name "*.md" -o -name "*.yml" \) -not -path "./node_modules/*" | while read -r file; do
            if [ -n "$(tail -c 1 "$file")" ]; then
              echo "Error: $file does not end with a newline."
              exit 1
            fi
          done
          echo "All files end with a newline."
