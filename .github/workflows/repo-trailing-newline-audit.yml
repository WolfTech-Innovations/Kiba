name: Repo Trailing Newline Audit
on:
  push:
    paths:
      - '**.sh'
      - '**.md'
      - '**.yml'
jobs:
  check-newline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for missing trailing newline
        run: |
          find . -type f \( -name "*.sh" -o -name "*.md" -o -name "*.yml" \) -not -path "./node_modules/*" | while read -r file; do
            if [ -n "$(tail -c 1 "$file")" ]; then
              echo "Error: $file does not end with a newline."
              exit 1
            fi
          done
