  push:
    timeout-minutes: 5
jobs:
  check-extensions:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Audit extensions
        run: |
          set -euo pipefail
          # Example: ensure all YAML files use .yml, not .yaml (except maybe certain files)
          find . -name "*.yaml" -not -name "pnpm-lock.yaml" | grep . && { echo "Error: Use .yml extension instead of .yaml"; exit 1; } || echo "Extension consistency check passed."
