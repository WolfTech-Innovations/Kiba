  push:
    timeout-minutes: 5
    paths:
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'
jobs:
  audit-concurrency:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Audit concurrency keys
        run: |
          set -euo pipefail
          for file in .github/workflows/*.yml; do
            # Check if concurrency is defined
            if yq -e '.concurrency' "$file" >/dev/null 2>&1; then
              # Check group formatting (should typically include workflow name or ref)
              group=$(yq '.concurrency.group' "$file")
              if [[ ! "$group" =~ \$ ]]; then
                echo "Warning: Concurrency group in $file might not be dynamic enough: $group"
              fi
            fi
          done
