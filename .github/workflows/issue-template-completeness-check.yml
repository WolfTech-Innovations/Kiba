  push:
    timeout-minutes: 5
    paths:
      - '.github/ISSUE_TEMPLATE/*.md'
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify template fields
        run: |
          find .github/ISSUE_TEMPLATE -name "*.md" | while read -r file; do
            grep -q "name:" "$file" && grep -q "description:" "$file" || { echo "Error: $file is missing mandatory fields"; exit 1; }
          done
