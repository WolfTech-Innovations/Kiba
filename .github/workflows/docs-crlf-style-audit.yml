  push:
    timeout-minutes: 5
    paths:
      - "**.md"
      - "**.txt"
      - "**.sh"
  pull_request:
    paths:
      - "**.md"
      - "**.txt"
      - "**.sh"
jobs:
  audit-crlf:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Scan for CRLF
        run: |
          set -euo pipefail
          # Find files with CRLF line endings
          grep -rl $'\r' . --include="*.md" --include="*.sh" --include="*.txt" && { echo "Error: CRLF line endings detected in text files. Use LF."; exit 1; } || echo "All text files use LF."
