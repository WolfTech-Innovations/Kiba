name: Heredoc Quoted Terminator Check

on:
  push:
    paths:
      - '.github/workflows/kiba.yml'
  workflow_dispatch:

jobs:
  check-heredoc:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify quoted heredoc terminators
        run: |
          # Rule: use quoted heredoc terminators (e.g., << 'EOF') to prevent premature expansion
          grep "<< [A-Z_]*" .github/workflows/kiba.yml | grep -v "'" && { echo "Error: Found unquoted heredoc terminator. Use << 'EOF' instead."; exit 1; }
          echo "Heredoc terminators are correctly quoted."
