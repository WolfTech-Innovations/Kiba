name: Repo Large File Prevention
on:
  pull_request:
jobs:
  check-size:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Get changed files
        id: changed-files
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git diff --name-only "origin/$BASE_REF" HEAD > changed_files.txt
      - name: Scan changed files for size
        run: |
          while read -r file; do
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file")
              if [ "$size" -gt 5242880 ]; then
                echo "Error: $file is larger than 5MB ($size bytes)."
                exit 1
              fi
            fi
          done < changed_files.txt
          echo "All changed files are within size limits"
