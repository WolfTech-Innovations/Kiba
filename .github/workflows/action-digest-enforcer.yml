name: Action Digest Enforcer

on:
  push:
    paths:
      - '.github/workflows/*.yml'
  workflow_dispatch:

jobs:
  check-digests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check for SHA-1 digests in actions
        run: |
          # Rule: prefer SHA-1 digests over tags for security (not enforced but audited)
          grep "uses: actions/" .github/workflows/*.yml | grep -v "@[a-f0-9]\{40\}" && echo "Notice: Some actions use tags instead of full SHA-1 digests."
          echo "Audit complete."
