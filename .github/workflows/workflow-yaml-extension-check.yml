name: Workflow YAML Extension Check
on:
  push:
    paths:
      - '.github/workflows/*'
jobs:
  check-extension:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Ensure .yml extension
        run: |
          find .github/workflows -name "*.yaml" | grep . && { echo "Error: Use .yml extension instead of .yaml for workflows."; exit 1; } || echo "Extension check passed"
