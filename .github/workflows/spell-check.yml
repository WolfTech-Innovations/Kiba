  push:
    timeout-minutes: 5
  pull_request:

jobs:
  codespell:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Run codespell
        uses: codespell-project/actions-codespell@v2
        with:
          ignore_words_file: .codespellignore
          ignore_words_list: vEw
          skip: .git,*.png,*.jpg,*.iso
          check_filenames: true
          check_hidden: true
