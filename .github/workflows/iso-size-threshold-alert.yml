  check-size:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Estimate ISO Size
        run: |
          count=$(grep -A 100 "PACKAGES" .github/workflows/kiba.yml | grep -v "PACKAGES" | grep -v "^#" | grep -v "^$" | grep -c .)
          echo "Current package count: $count"
          if [ "$count" -gt 300 ]; then
            echo "Warning: High package count may lead to ISO size issues."
          fi
