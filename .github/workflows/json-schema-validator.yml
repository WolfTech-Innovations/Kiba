name: JSON Schema Validator
on:
  push:
    paths:
      - '**.json'
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Basic JSON check
        run: |
          find . -name "*.json" | xargs -r -n1 python3 -m json.tool > /dev/null || { echo "Error: Invalid JSON found"; exit 1; }
