  push:
    timeout-minutes: 5
    paths:
      - '**.json'
jobs:
  validate:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Basic JSON check
        run: |
          find . -name "*.json" | xargs -r -n1 python3 -m json.tool > /dev/null || { echo "Error: Invalid JSON found"; exit 1; }
