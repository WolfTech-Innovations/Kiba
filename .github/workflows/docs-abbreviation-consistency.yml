name: Docs Abbreviation Consistency
on:
  push:
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'
jobs:
  check-abbreviations:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Audit abbreviations
        run: |
          set -euo pipefail
          # Ensure 'e.g.' and 'i.e.' are followed by a comma for consistency
          grep -rnE "e\.g\.[^,]" . --include="*.md" && { echo "Error: Use 'e.g.,' (with comma) for consistency."; exit 1; } || true
          grep -rnE "i\.e\.[^,]" . --include="*.md" && { echo "Error: Use 'i.e.,' (with comma) for consistency."; exit 1; } || true
          echo "Abbreviation consistency audit passed."
