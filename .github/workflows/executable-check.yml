name: Executable Check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for Executable Shell Scripts
        run: |
          while read -r f; do
            if [[ ! -x "$f" ]]; then
              echo "Error: $f is not executable"
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*")
