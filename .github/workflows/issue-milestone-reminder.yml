name: Issue Milestone Reminder

on:
  issues:
    types: [opened]

jobs:
  milestone-reminder:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      name: Run actions/github-script
      - uses: actions/github-script@v7
        with:
          script: |
            if (!context.payload.issue.milestone) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: "📌 Friendly reminder to assign this issue to a milestone."
              });
            }
