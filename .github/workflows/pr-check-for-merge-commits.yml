name: PR Check for Merge Commits
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Verify no merge commits
        run: |
          # Use HEAD instead of origin/main to avoid dependency on origin branch naming
          # We check commits between base and head of PR
          git rev-list --merges "origin/${{ github.base_ref }}..${{ github.event.pull_request.head.sha }}" | grep . && { echo "Error: Merge commits are not allowed. Please rebase."; exit 1; } || echo "No merge commits found."
