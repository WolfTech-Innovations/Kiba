name: PR Merge Commit Checker
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      name: Run actions/checkout
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Check for merge commits
        run: |
          git rev-list --merges origin/main..HEAD | grep . && { echo "Error: Merge commits are not allowed. Please rebase."; exit 1; } || echo "No merge commits"
