name: PR Merge Commit Checker
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for merge commits
        run: |
          git rev-list --merges origin/main..${{ github.event.pull_request.head.sha }} | grep . && { echo "Error: Merge commits are not allowed. Please rebase."; exit 1; } || echo "No merge commits"
