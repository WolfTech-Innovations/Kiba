name: Markdown List Style Enforcer
on:
  push:
    paths:
      - '**.md'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce dash lists
        run: |
          grep -rn "^ \*" . --include="*.md" && { echo "Error: Use dashes (-) for lists instead of asterisks (*)"; exit 1; } || echo "List style is consistent"
