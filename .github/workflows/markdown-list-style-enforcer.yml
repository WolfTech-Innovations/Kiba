name: Markdown List Style Enforcer
on:
  push:
    paths:
      - '**.md'
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Enforce dash lists
        run: |
          grep -rn "^ \*" . && { echo "Error: Use dashes (-) for lists instead of asterisks (*)"; exit 1; } || echo "List style is consistent"
