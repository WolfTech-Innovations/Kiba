name: Shell Local Variable Enforcer
on:
  push:
    paths:
      - '**.sh'
  pull_request:
    paths:
      - '**.sh'
jobs:
  enforce-local:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check for global variables in functions
        run: |
          set -euo pipefail
          FAILED=0
          while read -r file; do
            # Heuristic: Find assignments inside functions that aren't preceded by local/readonly/export
            # We ignore common false positives like return codes ($?) or standard variables
            if ! awk '/^[a-zA-Z0-9_]+\(\)/ {in_func=1; next} /^}/ {in_func=0} in_func && /^[[:space:]]+[a-zA-Z0-9_]+=/ && !/local|readonly|export|unset/ && !/^[[:space:]]+(IFS|OPTIND|OPTARG)=/ { print FILENAME ":" NR ": " $0; exit 1 }' "$file"; then
               echo "Warning: Potential non-local variable assignment in function in $file"
               # We demote this to a warning for now to avoid blocking PRs on false positives
            fi
          done < <(find . -name "*.sh" -not -path "./node_modules/*")
          # Always pass for now but provide useful feedback
