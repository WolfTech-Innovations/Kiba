name: Repo CRLF Line Endings Checker
on:
  push:
jobs:
  check-crlf:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Scan for CRLF
        run: |
          set -euo pipefail
          # Check for CRLF line endings
          grep -rl $'\r' . --exclude-dir=".git" && { echo "Error: CRLF line endings detected. Use LF."; exit 1; } || echo "No CRLF line endings found."
