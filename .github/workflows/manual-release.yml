name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Release Notes to Notes folder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generate filename: NTE-DDHYM
          # DD: Day of month (01-31)
          # H: Hour of day (0-N for 0-23)
          # Y: Last digit of year
          # M: Month (1-C for 1-12)

          DD=$(date +%d)

          H_VAL=$(date +%-H)
          HOURS="0123456789ABCDEFGHIJKLMN"
          H=$(echo $HOURS | cut -c $((H_VAL + 1)))

          Y=$(date +%y | cut -c 2)

          M_VAL=$(date +%-m)
          MONTHS="123456789ABC"
          M=$(echo $MONTHS | cut -c $M_VAL)

          FILENAME="Notes/NTE-${DD}${H}${Y}${M}.md"

          mkdir -p Notes
          # Fetch release body using GitHub CLI
          gh release view v${{ github.event.inputs.version }} --template '{{.body}}' > "$FILENAME"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILENAME"
          git commit -m "docs: add release notes $FILENAME [skip ci]"
          git pull --rebase origin main
          git push origin main
