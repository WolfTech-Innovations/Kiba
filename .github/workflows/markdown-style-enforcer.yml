name: Markdown Style Enforcer

on:
  pull_request:
    paths:
      - '**.md'

jobs:
  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          config: .github/linters/.markdownlint-cli2.yaml
          globs: "**/*.md"
