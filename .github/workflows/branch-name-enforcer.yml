name: Branch Name Enforcer
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Branch Name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          # Use variable for regex to prevent syntax issues and allow for 'perf' prefix
          REGEX='^(feat|fix|docs|refactor|chore|ci|perf|bolt)/'
          if [[ ! "$BRANCH" =~ $REGEX ]]; then
            echo "Invalid branch name: $BRANCH. Must start with feat/, fix/, docs/, refactor/, chore/, ci/, perf/, or bolt/."
            exit 1
          fi
