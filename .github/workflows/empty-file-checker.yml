  push:
    timeout-minutes: 5
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Find empty files
        run: |
          find . -type f -empty -not -path "./.git/*" -not -name ".gitkeep" | grep . && { echo "Error: Empty files found"; exit 1; } || echo "No empty files"
