  push:
    timeout-minutes: 5
    paths:
      - 'README.md'
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify title centering
        run: |
          head -n 20 README.md | grep -qi "<h1 align=\"center\">" || echo "Notice: Title might not be centered"
