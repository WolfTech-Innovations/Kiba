name: Flatpak Repo Monitor

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  check-flatpak:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Check Flathub Status
        run: |
          curl -sI https://dl.flathub.org/repo/flathub.flatpakrepo | grep "HTTP"
