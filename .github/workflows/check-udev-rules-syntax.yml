name: Check udev Rules Syntax
on:
  push:
    paths:
      - '**/udev/rules.d/*.rules'
  pull_request:
    paths:
      - '**/udev/rules.d/*.rules'
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate udev rules
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y udev
          find . -name "*.rules" -path "*/udev/rules.d/*" | while read -r file; do
            echo "Auditing $file..."
            # udevadm test-builtin can be used if we had the full environment, but simple check for now
            grep -v "^#" "$file" | grep -v "^$" | grep -vE "(==|!=|=|\+=|:=)" && { echo "Error: Invalid syntax in $file"; exit 1; } || true
          done
