  schedule:
    timeout-minutes: 5
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  validate-links:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Link Checker
        uses: lycheeverse/lychee-action@f089606a58398d5a711413a9394628f8f01b000f
        with:
          args: --verbose --no-progress README.md WIKI.md docs/*.md
        continue-on-error: true
