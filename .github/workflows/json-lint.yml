  push:
    timeout-minutes: 5
    paths:
      - "**/*.json"
  pull_request:
    paths:
      - "**/*.json"

jobs:
  jsonlint:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Run jsonlint
        run: |
          find . -name "*.json" -not -path "./node_modules/*" -print0 | xargs -0 -I {} npx jsonlint -q {}
