name: JSON Lint

on:
  push:
    paths:
      - "**/*.json"
  pull_request:
    paths:
      - "**/*.json"

jobs:
  jsonlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run jsonlint
        run: |
          find . -name "*.json" -type f -not -path "./node_modules/*" | xargs -r npx jsonlint -q
