name: JSON Lint

on:
  push:
    paths:
      - "**/*.json"
  pull_request:
    paths:
      - "**/*.json"

jobs:
  jsonlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run jsonlint
        run: |
          find . -name "*.json" -not -path "./node_modules/*" -print0 | xargs -0 -I {} npx jsonlint -q {}
