name: Documentation Sync Enforcer

on:
  pull_request:
    paths:
      - 'README.md'
      - 'WIKI.md'

jobs:
  enforce-sync:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify Requirements Sync
        run: |
          echo "Checked synchronization of system requirements."
          grep "Debian 13" README.md && grep "Debian 13" WIKI.md
