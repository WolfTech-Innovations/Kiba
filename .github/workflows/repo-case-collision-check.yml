name: Repo Case Collision Check
on:
  push:
  pull_request:
jobs:
  check-case:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for filename case collisions
        run: |
          find . -not -path "./.git/*" -not -path "./node_modules/*" | tr '[:upper:]' '[:lower:]' | sort | uniq -d | grep . && { echo "Error: Filename case collisions detected (incompatible with case-insensitive filesystems)."; exit 1; } || echo "No case collisions found"
