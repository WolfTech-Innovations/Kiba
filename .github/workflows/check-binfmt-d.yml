name: Check binfmt.d
on:
  push:
    paths:
      - '**/binfmt.d/*.conf'
  pull_request:
    paths:
      - '**/binfmt.d/*.conf'
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate binfmt.d config
        run: |
          set -euo pipefail
          find . -name "*.conf" -path "*/binfmt.d/*" | while read -r file; do
            echo "Auditing $file..."
            grep -v "^#" "$file" | grep -v "^$" | grep -v ":" && { echo "Error: Invalid binfmt format in $file"; exit 1; } || true
          done
