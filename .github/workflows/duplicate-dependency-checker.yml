name: Duplicate Dependency Checker
on:
  push:
    paths:
      - 'package.json'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for duplicates
        run: |
          grep -E '"[a-zA-Z0-9-]+":' package.json | sort | uniq -d | grep . && { echo "Error: Duplicate dependencies found in package.json"; exit 1; } || echo "No duplicates"
