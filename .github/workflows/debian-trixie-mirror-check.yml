name: Debian Trixie Mirror Check

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-mirrors:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Ping Debian Repos
        run: |
          curl -I https://deb.debian.org/debian/dists/trixie/Release || exit 1
          echo "Debian Trixie mirrors are reachable."
