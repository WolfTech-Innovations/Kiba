name: README Badges Alignment
on:
  push:
    paths:
      - 'README.md'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify badge alignment
        run: |
          grep -n "<p align=\"center\">" README.md | grep -q "^[0-9]:" || echo "Notice: Badges might not be centered at the top"
