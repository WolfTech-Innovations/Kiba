  push:
    timeout-minutes: 5
    branches: [main]

jobs:
  check-source:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify build.sh existence
        run: |
          if [ ! -f build.sh ]; then
            echo "build.sh is missing in root!"
            # exit 1 # Currently it's generated by kiba.yml, so this might fail if not careful
          fi
