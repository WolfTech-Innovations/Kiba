name: Check sudoers Snippets
on:
  push:
    paths:
      - '**/sudoers.d/*'
  pull_request:
    paths:
      - '**/sudoers.d/*'
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate sudoers snippets
        run: |
          set -euo pipefail
          find . -path "*/sudoers.d/*" -type f | while read -r file; do
            echo "Auditing $file..."
            visudo -c -f "$file" || { echo "Error: visudo validation failed for $file"; exit 1; }
          done
