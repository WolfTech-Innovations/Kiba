  push:
    timeout-minutes: 5
    paths:
      - 'docs/*.md'
  workflow_dispatch:

jobs:
  check-toc:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify TOC existence
        run: |
          for doc in docs/*.md; do
            if [ "$doc" == "docs/README.md" ]; then continue; fi
            grep -qi "Table of Contents" "$doc" || echo "Notice: $doc might benefit from a Table of Contents."
          done
