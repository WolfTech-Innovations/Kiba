name: Workflow Secret Usage Audit
on:
  push:
    paths:
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'
jobs:
  audit-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Scan for custom secrets in workflows
        run: |
          set -euo pipefail
          # Find all occurrences of secrets.* except for GITHUB_TOKEN
          SECRETS_FOUND=$(grep -rn "secrets\." .github/workflows/*.yml | grep -v "GITHUB_TOKEN" || true)
          if [ -n "$SECRETS_FOUND" ]; then
            echo "Custom secrets detected in workflows. Ensure they are handled securely:"
            echo "$SECRETS_FOUND"
          else
            echo "No custom secrets found."
          fi

          # Check for secrets being passed as arguments to shell commands (potential leakage)
          LEAKAGE_RISK=$(grep -rnE "\b(echo|printf).*secrets\." .github/workflows/*.yml || true)
          if [ -n "$LEAKAGE_RISK" ]; then
             echo "Error: Detected secrets being passed to echo/printf in workflows:"
             echo "$LEAKAGE_RISK"
             exit 1
          fi
