name: TODO Comment Tracker
on:
  push:
    branches: [main]
jobs:
  track-todos:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: List todos
        run: |
          grep -rnE "TODO|FIXME" . --exclude-dir=.git | grep . && { echo "Pending TODOs found"; } || echo "No TODOs"
