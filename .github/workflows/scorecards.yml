  schedule:
    timeout-minutes: 5
    - cron: "30 1 * * 6"
  push:
    timeout-minutes: 5
    branches: ["main"]

# Declare default permissions as read only.
permissions: read-all

jobs:
  analysis:
    timeout-minutes: 60
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the results to code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge (see publish_results below).
      id-token: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@62b54023910c01168128526019a16a495958a27d
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@4cedc5d8ad5e4443228c308296d19451d62051f2
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
