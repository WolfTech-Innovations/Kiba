name: Docs No Placeholder Text
on:
  push:
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'
jobs:
  check-placeholders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Scan for TODO/FIXME
        run: |
          set -euo pipefail
          grep -rnE "TODO|FIXME|\[INSERT.*\]" . --include="*.md" && { echo "Error: Placeholder text found in documentation."; exit 1; } || echo "No placeholders found in docs."
