name: Repo Git Conflict Marker Check
on:
  push:
  pull_request:
jobs:
  check-conflicts:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      name: Run actions/checkout
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Scan for conflict markers
        run: |
          grep -rE "<<<<<<<{7}|=======|>>>>>>>{7}" . --exclude-dir=.git --exclude-dir=node_modules && { echo "Error: Unresolved Git conflict markers found."; exit 1; } || echo "No conflict markers found"
