name: Repo Git Conflict Marker Check
on:
  push:
  pull_request:
jobs:
  check-conflicts:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for conflict markers
        run: |
          grep -rE "<<<<<<<|=======|>>>>>>>" . --exclude-dir=.git --exclude-dir=node_modules && { echo "Error: Unresolved Git conflict markers found."; exit 1; } || echo "No conflict markers found"
