name: Shell Quoting Checker

on:
  push:
    paths:
      - '.github/workflows/kiba.yml'
  workflow_dispatch:

jobs:
  check-quoting:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify variable quoting in kiba.yml
        run: |
          # Simple check for unquoted variables in shell blocks within kiba.yml
          grep -nE '[^"]\$[A-Z0-9_]+[^"]' .github/workflows/kiba.yml | grep -v '{{' || echo "Quoting looks good."
