  schedule:
    timeout-minutes: 5
    - cron: "0 0 * * 0" # Weekly on Sunday
  workflow_dispatch:

jobs:
  cleanup-runs:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@369a23916ef4242699c64673f8373b9f1d0728c7
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 5
