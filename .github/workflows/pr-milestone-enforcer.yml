name: PR Milestone Enforcer

on:
  pull_request:
    types: [opened, edited, synchronize, milestoned, demilestoned]

jobs:
  check-milestone:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.pull_request.user.login, 'jules') &&
      github.event.pull_request.user.login != 'christopherfoxjr'
    steps:
      - name: Verify milestone assignment
        if: github.event.pull_request.milestone == null
        run: |
          echo "Error: This PR must be assigned to a milestone."
          exit 1
