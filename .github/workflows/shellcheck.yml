  push:
    timeout-minutes: 5
    paths:
      - "**/*.sh"
      - ".github/workflows/*.yml"
  pull_request:
    paths:
      - "**/*.sh"
      - ".github/workflows/*.yml"

jobs:
  shellcheck:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@941442c55e88846ef82586482586482586482586
        with:
          scandir: "."
          ignore_names: "build.sh" # build.sh is often generated or has complex bashisms
