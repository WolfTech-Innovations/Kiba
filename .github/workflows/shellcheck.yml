name: ShellCheck

on:
  push:
    paths:
      - '**/*.sh'
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '**/*.sh'
      - '.github/workflows/*.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          ignore_names: 'build.sh' # build.sh is often generated or has complex bashisms
