name: ShellCheck

on:
  push:
    paths:
      - "**/*.sh"
      - ".github/workflows/*.yml"
  pull_request:
    paths:
      - "**/*.sh"
      - ".github/workflows/*.yml"

jobs:
  shellcheck:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          ignore_names: "build.sh" # build.sh is often generated or has complex bashisms
