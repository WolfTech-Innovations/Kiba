name: Branding File Existence Check
on:
  push:
    paths:
      - 'branding/**'
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify essential assets
        run: |
          ls branding/kibaos_banner.png || { echo "Warning: kibaos_banner.png is missing"; }
