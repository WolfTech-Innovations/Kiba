name: Shell Arithmetic Syntax Check
on:
  push:
    paths:
      - '**.sh'
  pull_request:
    paths:
      - '**.sh'
jobs:
  check-arithmetic:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan for expr usage
        run: |
          find . -name "*.sh" -not -path "./node_modules/*" | xargs -r grep -l "expr " && { echo "Error: Use \$((...)) for arithmetic instead of 'expr'."; exit 1; } || echo "No 'expr' usage found"
