name: Stale Issue Soft Closer

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  stale-handler:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "stale"
