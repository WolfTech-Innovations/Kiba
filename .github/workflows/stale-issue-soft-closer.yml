  schedule:
    timeout-minutes: 5
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  stale-handler:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@28ca10362944ca34dd6fe388fefc5f02f8319692
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "stale"
