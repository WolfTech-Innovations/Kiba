  push:
    timeout-minutes: 5
    paths:
      - '.github/workflows/*.yml'
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify push main trigger
        run: |
          grep -r "branches: \[main\]" .github/workflows/*.yml || echo "Notice: Some workflows might not trigger on main branch"
