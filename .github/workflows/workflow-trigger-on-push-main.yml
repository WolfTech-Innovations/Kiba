name: Workflow Trigger Main Check
on:
  push:
    paths:
      - '.github/workflows/*.yml'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify push main trigger
        run: |
          grep -r "branches: \[main\]" .github/workflows/*.yml || echo "Notice: Some workflows might not trigger on main branch"
