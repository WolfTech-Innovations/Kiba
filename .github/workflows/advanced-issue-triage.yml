name: Advanced Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body.toLowerCase();
            const labels = [];
            if (body.includes('bug') || body.includes('reproduce')) labels.push('bug');
            if (body.includes('feature') || body.includes('request')) labels.push('feature');
            if (body.includes('branding') || body.includes('logo')) labels.push('branding');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labels
              });
            }
