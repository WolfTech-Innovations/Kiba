name: Repo Hidden File Audit
on:
  push:
    paths-ignore:
      - '.github/**'
      - '.git/**'
jobs:
  audit-hidden:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Scan for unexpected hidden files
        run: |
          set -euo pipefail
          # List hidden files excluding known ones
          # Removed the repository-specific .Jules* exclusion to make it more generic or strictly controlled
          find . -maxdepth 2 -name ".*" -not -path "./.git*" -not -path "./.github*" -not -path "." -not -path "./.vscode*" -not -path "./.idea*" -not -name ".gitignore" -not -name ".prettierrc*" -not -name ".codespellignore" -not -name ".prettierignore" -not -name ".gitkeep" | grep . && { echo "Error: Unexpected hidden files found."; exit 1; } || echo "No unexpected hidden files."
