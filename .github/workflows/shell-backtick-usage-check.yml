name: Shell Backtick Usage Check
on:
  push:
    paths:
      - '**.sh'
  pull_request:
    paths:
      - '**.sh'
jobs:
  check-backticks:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      name: Run actions/checkout
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Scan for backticks
        run: |
          find . -name "*.sh" -not -path "./node_modules/*" | xargs -r grep -l "`" && { echo "Error: Use \$(...) instead of backticks for command substitution."; exit 1; } || echo "No backticks found"
