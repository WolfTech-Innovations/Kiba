  push:
    timeout-minutes: 5
    paths:
      - '**.sh'
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check for set -e
        run: |
          find . -name "*.sh" | while read -r file; do
            grep -qE "set -e|set -o errexit" "$file" || { echo "Error: $file is missing 'set -e'"; exit 1; }
          done
