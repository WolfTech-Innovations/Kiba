name: Shell Best Practice Audit
on:
  push:
    paths:
      - '**.sh'
jobs:
  audit:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      name: Run actions/checkout
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check for common pitfalls
        run: |
          find . -name "*.sh" | xargs -r grep -l "for .* in \$(ls" && { echo "Pitfall: Avoid using ls in loops"; exit 1; } || echo "No common pitfalls found"
