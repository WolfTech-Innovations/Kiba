name: Issue Duplicate Checker

on:
  issues:
    types: [opened]

jobs:
  check-duplicates:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            for (const issue of issues) {
              if (issue.number !== context.payload.issue.number && issue.title.toLowerCase().includes(title)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  body: `🔍 Possible duplicate of #${issue.number}. Please check if this issue has already been reported.`
                });
                break;
              }
            }
