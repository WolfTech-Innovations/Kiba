name: Repo Forbidden Directory Structure
on:
  push:
jobs:
  check-dirs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Scan for forbidden top-level dirs
        run: |
          set -euo pipefail
          # Example: Prevent 'temp' or 'test' (if we use 'tests') at root
          find . -maxdepth 1 -type d \( -name "temp" -o -name "tmp" \) | grep . && { echo "Error: Forbidden directory at root."; exit 1; } || echo "Root structure is clean."
