name: Workflow Deprecated Runners Audit
on:
  push:
    paths:
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'
jobs:
  audit-runners:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Scan for ubuntu-18.04 or ubuntu-20.04
        run: |
          grep -rE "ubuntu-18.04|ubuntu-20.04" .github/workflows/*.yml && { echo "Warning: Use of deprecated or older runners detected."; } || echo "Modern runners in use"
