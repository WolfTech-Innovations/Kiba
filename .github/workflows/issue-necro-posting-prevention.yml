name: Issue Necro-Posting Prevention

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  lock-threads:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@1bf7ec25051fe7c00bdd17e6a7cf3d7bfb7dc771
        with:
          issue-inactive-days: "180"
          pr-inactive-days: "180"
