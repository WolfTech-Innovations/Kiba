name: Issue Necro-Posting Prevention

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  lock-threads:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      name: Run dessant/lock-threads
      - uses: dessant/lock-threads@v5
        with:
          issue-inactive-days: "180"
          pr-inactive-days: "180"
