name: First PR Welcome Guide

on:
  pull_request_target:
    types: [opened]

jobs:
  welcome-onboard:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Welcome Message
        uses: actions/github-script@v7
        with:
          script: |
            console.log("Welcoming first-time contributor...");
