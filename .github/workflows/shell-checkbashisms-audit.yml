name: Shell Checkbashisms Audit
on:
  push:
    paths:
      - '**.sh'
  pull_request:
    paths:
      - '**.sh'
jobs:
  audit-bashisms:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run checkbashisms
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq devscripts > /dev/null
          find . -name "*.sh" -not -path "./node_modules/*" | xargs -r checkbashisms -n -p
