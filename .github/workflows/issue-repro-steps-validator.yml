  issues:
    timeout-minutes: 5
    types: [opened, edited]

jobs:
  validate-repro:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'bug')
    steps:
      - name: Check for reproduction steps
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if ! echo "$ISSUE_BODY" | grep -qiE "reproduce|steps|how to"; then
            echo "Error: Bug reports must include reproduction steps."
            exit 1
          fi
