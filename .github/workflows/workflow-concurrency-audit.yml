name: Workflow Concurrency Audit
on:
  push:
    paths:
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'
jobs:
  audit-concurrency:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check for concurrency key
        run: |
          grep -L "concurrency:" .github/workflows/*.yml && echo "Notice: Some workflows are missing concurrency control." || echo "Concurrency usage audited"
