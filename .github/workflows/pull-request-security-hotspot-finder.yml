name: PR Security Hotspot Finder
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  find-hotspots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check for sensitive changes
        run: |
          git fetch origin main
          git diff --name-only origin/main | grep -E 'SECURITY.md|LICENSE|.github/workflows/' && { echo "Security hotspot detected in changed files"; exit 1; } || echo "No hotspots detected"
