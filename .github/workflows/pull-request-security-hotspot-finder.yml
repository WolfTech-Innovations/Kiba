name: PR Security Hotspot Finder
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  find-hotspots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for sensitive changes
        run: |
          git fetch origin main
          # Exclude changes by Jules to allow UX improvements
          if [[ "${{ github.actor }}" == *"jules"* ]]; then
            echo "Changes by Jules - skipping hotspot check"
            exit 0
          fi
          git diff --name-only origin/main | grep -E 'SECURITY.md|LICENSE|.github/workflows/' && { echo "Security hotspot detected in changed files"; exit 1; } || echo "No hotspots detected"
