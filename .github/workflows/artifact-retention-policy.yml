  push:
    timeout-minutes: 5
    branches: [main]
  workflow_dispatch:

jobs:
  check-retention:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify artifact retention in kiba.yml
        run: |
          # Ensure artifacts are kept for at least 7 days (simplified check)
          grep -i "retention-days" .github/workflows/kiba.yml || echo "Notice: kiba.yml does not specify retention-days. Using default (90 days)."
