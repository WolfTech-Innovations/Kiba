  check-attribution:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Verify attribution in body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if ! echo "$PR_BODY" | grep -qiE "authored-by|credits|attribution"; then
            echo "Warning: No contributor attribution found in PR description."
            # We don't fail, but we could add a comment or label
          fi
