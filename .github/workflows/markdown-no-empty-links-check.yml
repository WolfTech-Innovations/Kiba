name: Markdown No Empty Links Check
on:
  push:
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'
jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan for empty links
        run: |
          find . -name "*.md" -not -path "./node_modules/*" | xargs -r grep -l "\[\]()" && { echo "Error: Found empty links '[]()' in Markdown files."; exit 1; } || echo "No empty links found"
