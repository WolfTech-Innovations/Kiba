  push:
    timeout-minutes: 5
    paths:
      - 'branding/**'
      - '.github/workflows/kiba.yml'

jobs:
  verify-paths:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check Asset References
        run: |
          for asset in branding/*; do
            [ -f "$asset" ] || continue
            filename=$(basename "$asset")
            if ! grep -q "$filename" .github/workflows/kiba.yml; then
              echo "Warning: Asset $filename is not referenced in the build workflow."
            fi
          done
