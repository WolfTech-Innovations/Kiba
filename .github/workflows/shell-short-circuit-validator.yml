  push:
    timeout-minutes: 5
    paths:
      - '.github/workflows/kiba.yml'
  workflow_dispatch:

jobs:
  check-short-circuit:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check for SC2015 violations
        run: |
          # Rule: avoid A && B || C
          grep -E "&&.*\|\|" .github/workflows/kiba.yml && { echo "Warning: Potential SC2015 violation (A && B || C). Use explicit 'if' statements."; }
          echo "Check complete."
