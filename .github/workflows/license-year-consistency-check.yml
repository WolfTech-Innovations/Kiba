name: License Year Consistency Check
on:
  push:
    paths:
      - 'LICENSE'
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Verify year
        run: |
          CURRENT_YEAR=$(date +%Y)
          grep -q "$CURRENT_YEAR" LICENSE || echo "Notice: LICENSE year might need update"
