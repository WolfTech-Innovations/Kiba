  push:
    timeout-minutes: 5
    paths:
      - 'LICENSE'
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify year
        run: |
          CURRENT_YEAR=$(date +%Y)
          grep -q "$CURRENT_YEAR" LICENSE || echo "Notice: LICENSE year might need update"
