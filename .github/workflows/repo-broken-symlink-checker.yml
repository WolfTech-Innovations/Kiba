name: Repo Broken Symlink Checker
on:
  push:
    paths-ignore:
      - 'node_modules/**'
  schedule:
    - cron: "0 0 * * 0"
jobs:
  check-symlinks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan for broken symlinks
        run: |
          find . -xtype l -not -path "./node_modules/*" | grep . && { echo "Error: Broken symbolic links detected."; exit 1; } || echo "No broken symlinks found"
