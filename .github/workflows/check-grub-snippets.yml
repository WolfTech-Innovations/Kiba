name: Check GRUB Snippets
on:
  push:
    paths:
      - '**/grub.d/*'
  pull_request:
    paths:
      - '**/grub.d/*'
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate GRUB scripts
        run: |
          set -euo pipefail
          find . -path "*/grub.d/*" -type f | while read -r file; do
            echo "Auditing $file..."
            bash -n "$file" || { echo "Error: Syntax error in $file"; exit 1; }
          done
