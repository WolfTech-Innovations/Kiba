  issues:
    timeout-minutes: 5
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  greeting:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@1100f40d343419080f4f9f4306354f9a01538356
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Hello! Thank you for opening your first issue in KibaOS. We'll get back to you soon!"
          pr-message: "Welcome! Thank you for your first contribution to KibaOS. We'll review your PR as soon as possible."
