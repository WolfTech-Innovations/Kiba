name: License Year Updater

on:
  schedule:
    - cron: "0 0 1 1 *" # Yearly on Jan 1st
  workflow_dispatch:

jobs:
  update-license-year:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Update year in LICENSE
        run: |
          CURRENT_YEAR=$(date +%Y)
          sed -i "s/Copyright (c) [0-9]\{4\}/Copyright (c) $CURRENT_YEAR/" LICENSE
          # Only proceed if changes were made
          git diff --exit-code LICENSE || {
            git config user.name "KibaBot"
            git config user.email "bot@kibaos.org"
            git checkout -b "chore/update-license-year-$CURRENT_YEAR"
            git add LICENSE
            git commit -m "chore: update license year to $CURRENT_YEAR"
            # In a real repo, we'd push and open a PR
          }
