name: Docs Security Policy Check

on:
  push:
    paths:
      - 'SECURITY.md'
  workflow_dispatch:

jobs:
  validate-security-policy:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check for reporting instructions
        run: |
          grep -qi "report" SECURITY.md || { echo "Error: SECURITY.md must include instructions on how to report vulnerabilities."; exit 1; }
          grep -qi "vulnerability" SECURITY.md || { echo "Error: SECURITY.md must mention 'vulnerability'."; exit 1; }
