name: PR Label Requirements

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]

jobs:
  check-labels:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.pull_request.user.login, 'jules') &&
      github.event.pull_request.user.login != 'christopherfoxjr'
    steps:
      - name: Check for required labels
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);
            const hasRequired = labels.some(l => ['bug', 'feat', 'docs', 'chore', 'refactor'].includes(l));
            if (!hasRequired) {
              core.setFailed('PR must have at least one semantic label (bug, feat, docs, chore, refactor)');
            }
