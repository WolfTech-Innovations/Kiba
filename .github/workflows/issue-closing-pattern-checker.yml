name: Issue Closing Pattern Checker

on:
  issues:
    types: [closed]

jobs:
  check-closing-comment:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      issues: read
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number
            });

            if (comments.length === 0 || !comments[comments.length - 1].body.toLowerCase().includes('fixed') && !comments[comments.length - 1].body.toLowerCase().includes('resolved')) {
              console.log("Notice: Issue closed without a 'fixed' or 'resolved' comment.");
            }
