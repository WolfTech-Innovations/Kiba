  push:
    timeout-minutes: 5
    paths:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  check-mermaid:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check for Mermaid diagram markers
        run: |
          if grep -r '```mermaid' .; then
            echo "Mermaid diagrams detected. Ensuring they are followed by a newline for better rendering."
            # This is a passive check
          fi
