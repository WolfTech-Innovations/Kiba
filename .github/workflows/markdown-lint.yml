name: Markdown Lint

on:
  push:
    paths:
      - "**/*.md"
  pull_request:
    paths:
      - "**/*.md"

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        uses: davidans/github-action-markdownlint@v1
        with:
          config: .github/linters/.markdown-lint.yml
