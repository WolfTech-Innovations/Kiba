name: YAML Anchors Audit
on:
  push:
    paths:
      - '.github/workflows/*.yml'
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check for anchors
        run: |
          grep -rn "&" .github/workflows/*.yml && echo "Notice: YAML anchors are used in workflows" || echo "No anchors used"
