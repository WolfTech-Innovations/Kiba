name: Repository DOS Line Endings Check
on:
  push:
    paths-ignore:
      - "**.png"
      - "**.jpg"
      - "**.ico"
  pull_request:
    paths-ignore:
      - "**.png"
      - "**.jpg"
      - "**.ico"
jobs:
  check-eol:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan for CRLF line endings
        run: |
          grep -rlI $'\r' . --exclude-dir=.git --exclude-dir=node_modules && { echo "Error: CRLF line endings detected. Use LF instead."; exit 1; } || echo "All line endings are LF"
