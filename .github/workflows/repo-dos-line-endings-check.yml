name: Repository DOS Line Endings Check
on:
  push:
    paths-ignore:
      - "**.png"
      - "**.jpg"
      - "**.ico"
  pull_request:
    paths-ignore:
      - "**.png"
      - "**.jpg"
      - "**.ico"
jobs:
  check-eol:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check for CRLF
        run: |
          # Use grep -r to find carriage returns
          grep -rl $'\r' . --exclude-dir=.git --exclude-dir=node_modules --exclude="*.png" --exclude="*.jpg" --exclude="*.ico" && { echo "Error: CRLF line endings detected. Use LF instead."; exit 1; } || echo "All line endings are LF"
