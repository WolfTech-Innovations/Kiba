name: Repository DOS Line Endings Check
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check-eol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for CRLF line endings
        run: |
          grep -rl $'\r' . --exclude-dir=.git --exclude-dir=node_modules --exclude="repo-dos-line-endings-check.yml" --exclude="*.png" --exclude="*.jpg" --exclude="*.jpeg" --exclude="*.ico" && { echo "Error: CRLF line endings detected. Use LF instead."; exit 1; } || echo "All line endings are LF"
