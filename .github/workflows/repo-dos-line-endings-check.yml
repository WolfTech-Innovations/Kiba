name: Repo DOS Line Endings Check
on:
  push:
  pull_request:
jobs:
  check-eol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for CRLF line endings
        run: |
          grep -rl $'\r' . --exclude-dir=.git --exclude-dir=node_modules && { echo "Error: CRLF line endings detected. Use LF instead."; exit 1; } || echo "All line endings are LF"
