name: PR Co-author Syntax Validator
on:
  pull_request:
    types: [opened, synchronize, edited]
jobs:
  validate-co-authors:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      name: Run actions/checkout
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check commit messages for Co-authored-by
        run: |
          # Ensure Co-authored-by has a valid email format
          git log -1 --pretty=%B | grep "Co-authored-by:" | grep -vE "<.+@.+\..+>" && { echo "Error: Invalid Co-authored-by format. Use: Co-authored-by: Name <email@example.com>"; exit 1; } || echo "Co-authors valid"
