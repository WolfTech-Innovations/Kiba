name: PR Co-author Syntax Validator
on:
  pull_request:
    types: [opened, synchronize, edited]
jobs:
  validate-co-authors:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Check commit messages for Co-authored-by
        run: |
          git log origin/${{ github.base_ref }}..HEAD --pretty=%B | grep "Co-authored-by:" | grep -vE "<.+@.+\..+>" && { echo "Error: Invalid Co-authored-by format. Use: Co-authored-by: Name <email@example.com>"; exit 1; } || echo "Co-authors valid"
