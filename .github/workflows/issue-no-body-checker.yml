  issues:
    timeout-minutes: 5
    types: [opened]
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Check body
        env:
          BODY: ${{ github.event.issue.body }}
        run: |
          if [[ -z "$BODY" || "$BODY" == "null" ]]; then
            echo "Error: Issue must have a body"
            exit 1
          fi
