name: Docs Heading Style Audit
on:
  push:
    paths:
      - 'docs/*.md'
jobs:
  audit-headings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check heading style
        run: |
          # Enforce ATX headings (#) and forbid Setext headings (--- or === under text)
          grep -rE "^[=|-]+$" docs/*.md && { echo "Setext headings found, use ATX (#)"; exit 1; } || echo "Heading style looks good"
