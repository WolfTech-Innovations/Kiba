name: Shell Printf Portability Check
on:
  push:
    paths:
      - '**.sh'
  pull_request:
    paths:
      - '**.sh'
jobs:
  check-printf:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Scan for echo -e
        run: |
          set -euo pipefail
          find . -name "*.sh" -not -path "./node_modules/*" | xargs -r grep -n "echo -e" && { echo "Error: Use printf for portability instead of echo -e."; exit 1; } || echo "No echo -e usage found."
