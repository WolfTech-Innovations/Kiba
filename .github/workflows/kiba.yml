name: "KibaOS Build"

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker system prune -af --volumes

      - name: Create build script
        run: |
          cat > build.sh << 'BUILD_SCRIPT_EOF'
          #!/bin/bash
          set -ex
          export DEBIAN_FRONTEND=noninteractive

          # Install live-build
          apt-get update && apt-get install -y \
            live-build debootstrap xorriso git

          cd /w
          ISO="kibaos-v${RUN_NUM}"

          echo "=== Configuring live-build ==="

          lb config \
            --distribution trixie \
            --architectures amd64 \
            --archive-areas "main contrib non-free non-free-firmware" \
            --debian-installer live \
            --debian-installer-gui false \
            --binary-images iso-hybrid \
            --mode debian \
            --system live \
            --linux-flavours amd64 \
            --linux-packages "linux-image linux-headers" \
            --bootappend-live "boot=live components quiet splash" \
            --bootappend-install "auto=true priority=critical" \
            --iso-application "KibaOS" \
            --iso-volume "KIBAOS" \
            --apt-options "--yes --no-install-recommends"

          echo "=== Adding packages ==="

          mkdir -p config/package-lists
          cat > config/package-lists/kde.list.chroot << 'PACKAGES'
          # Base system
          linux-image-amd64
          firmware-linux-free
          firmware-linux-nonfree
          systemd-sysv
          sudo
          ca-certificates
          openssl

          # Network
          network-manager
          wpasupplicant
          wget
          curl
          git

          # KDE Plasma 6 (Debian 13 trixie)
          kde-plasma-desktop
          plasma-desktop
          plasma-workspace
          sddm
          sddm-theme-debian-breeze
          kde-standard
          plasma-nm
          plasma-pa
          plasma-firewall
          dolphin
          konsole
          kate
          ark
          okular
          gwenview
          kde-spectacle
          kcalc
          qt6-svg-plugins
          desktop-file-utils
           plasma-widgets-addons
          

          # Shell - zsh
          zsh
          zsh-autosuggestions
          zsh-syntax-highlighting

          # Boot splash
          plymouth
          plymouth-themes
          kde-config-plymouth

          # Essential apps
          firefox-esr
          vlc
          calamares
          calamares-settings-debian

          # Essential tools
          nano
          gparted
          htop

          # Filesystems
          ntfs-3g
          exfatprogs

          # Boot loader
          grub-efi-amd64
          grub-pc-bin

          # CachyOS kernel build deps
          build-essential
          libncurses-dev
          gawk
          flex
          bison
          openssl
          libssl-dev
          dkms
          libelf-dev
          libudev-dev
          libpci-dev
          libiberty-dev
          autoconf
          bc
          rsync
          kmod
          cpio
          python3
          debhelper
          fakeroot
          PACKAGES

          echo "=== Creating live customization hook ==="

          mkdir -p config/hooks/live
          cat > config/hooks/live/0100-customize.hook.chroot << 'HOOK'
          #!/bin/bash
          set -e

          # ── Plymouth theme setup ──────────────────────────────────────────

          mkdir -p /usr/share/kibaos
          mkdir -p /usr/share/plymouth/themes/kibaos-spinner

          # Embed boot logo as base64 and decode it directly — no network needed
          cat > /tmp/logo_b64.txt << 'LOGO_B64'
          
          LOGO_B64

          base64 -d /tmp/logo_b64.txt > /usr/share/kibaos/logo.png
          rm /tmp/logo_b64.txt

          # Plymouth theme config — Dracula indigo background (#282a36)
          cat > /usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.plymouth << 'PLYMOUTH_THEME'
          [Plymouth Theme]
          Name=KibaOS Spinner
          Description=KibaOS boot splash
          ModuleName=script

          [script]
          ImageDir=/usr/share/plymouth/themes/kibaos-spinner
          ScriptFile=/usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.script
          PLYMOUTH_THEME

          # Midnight indigo = Dracula #282a36 = (0.157, 0.165, 0.212)
          cat > /usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.script << 'PLYMOUTH_SCRIPT'
          Window.SetBackgroundTopColor(0.157, 0.165, 0.212);
          Window.SetBackgroundBottomColor(0.157, 0.165, 0.212);

          logo.image = Image("watermark.png");
          logo.sprite = Sprite(logo.image);
          logo.x = Window.GetX() + Window.GetWidth()  / 2 - logo.image.GetWidth()  / 2;
          logo.y = Window.GetY() + Window.GetHeight() / 2 - logo.image.GetHeight() / 2 - 80;
          logo.sprite.SetPosition(logo.x, logo.y, 0);

          for (i = 0; i < 32; i++) {
              spinner_image[i] = Image("spinner-" + i + ".png");
          }
          spinner.sprite = Sprite();
          spinner.frame = 0;
          spinner.x = Window.GetX() + Window.GetWidth()  / 2 - spinner_image[0].GetWidth()  / 2;
          spinner.y = logo.y + logo.image.GetHeight() + 40;
          spinner.sprite.SetPosition(spinner.x, spinner.y, 1);

          fun progress_callback(duration, progress) {
              spinner.frame = Math.Int(progress * 32) % 32;
              spinner.sprite.SetImage(spinner_image[spinner.frame]);
          }
          Plymouth.SetRefreshFunction(progress_callback);

          message_sprite = Sprite();
          message_sprite.SetPosition(10, 10, 10000);
          fun message_callback(text) {
              message_image = Image.Text(text, 1, 1, 1);
              message_sprite.SetImage(message_image);
          }
          Plymouth.SetMessageFunction(message_callback);
          PLYMOUTH_SCRIPT

          cp /usr/share/kibaos/logo.png \
             /usr/share/plymouth/themes/kibaos-spinner/watermark.png

          # Borrow spinner frames from the default spinner theme if available
          if [ -d /usr/share/plymouth/themes/spinner ]; then
              cp /usr/share/plymouth/themes/spinner/spinner-*.png \
                 /usr/share/plymouth/themes/kibaos-spinner/ 2>/dev/null || true
          fi

          update-alternatives --install \
            /usr/share/plymouth/themes/default.plymouth default.plymouth \
            /usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.plymouth 100
          update-alternatives --set default.plymouth \
            /usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.plymouth

          # Rebuild initramfs so plymouth theme actually loads on boot
          update-initramfs -u -k all || update-initramfs -u

          # ── GRUB branding ─────────────────────────────────────────────────

          cat >> /etc/default/grub << 'GRUB_CONFIG'

          # KibaOS GRUB Branding
          GRUB_DISTRIBUTOR="KibaOS"
          GRUB_TIMEOUT=5
          GRUB_CMDLINE_LINUX_DEFAULT="quiet splash"
          GRUB_CMDLINE_LINUX=""
          GRUB_GFXMODE=1920x1080,1280x720,auto
          GRUB_COLOR_NORMAL="white/black"
          GRUB_COLOR_HIGHLIGHT="black/white"
          GRUB_CONFIG

          # ── SDDM autologin for live session ───────────────────────────────

          mkdir -p /etc/sddm.conf.d
          cat > /etc/sddm.conf.d/autologin.conf << 'SDDM_CONF'
          [Autologin]
          User=user
          Session=plasma
          SDDM_CONF

          # ── Default shell: zsh ────────────────────────────────────────────

          chsh -s /bin/zsh user  2>/dev/null || true
          chsh -s /bin/zsh root  2>/dev/null || true

          cat > /etc/zsh/zshrc << 'ZSHRC'
          # KibaOS system-wide zshrc
          export LANG=en_US.UTF-8
          export EDITOR=nano

          HISTSIZE=10000
          SAVEHIST=10000
          HISTFILE=~/.zsh_history
          setopt SHARE_HISTORY
          setopt HIST_IGNORE_DUPS

          autoload -Uz compinit && compinit
          zstyle ':completion:*' menu select

          autoload -Uz vcs_info
          precmd() { vcs_info }
          PROMPT='%F{#bd93f9}%n@%m%f %F{#f8f8f2}%~%f %F{#bd93f9}❯%f '

          source /usr/share/zsh-autosuggestions/zsh-autosuggestions.zsh 2>/dev/null || true
          source /usr/share/zsh-syntax-highlighting/zsh-syntax-highlighting.zsh 2>/dev/null || true

          alias ls='ls --color=auto'
          alias ll='ls -lah'
          alias update='sudo apt update && sudo apt upgrade -y'
          alias install='sudo apt install'
          ZSHRC

          # ── Live user setup ───────────────────────────────────────────────

          if ! id -u user >/dev/null 2>&1; then
            useradd -m -s /bin/zsh -G sudo,audio,video,netdev,plugdev user
            echo "user:live" | chpasswd
          else
            usermod -s /bin/zsh user
          fi

          echo "user ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/live-user
          chmod 440 /etc/sudoers.d/live-user

          # ── Disable sleep / suspend ───────────────────────────────────────
          mkdir -p /etc/systemd/sleep.conf.d
          cat > /etc/systemd/sleep.conf.d/nosleep.conf << 'NOSLEEP'
          [Sleep]
          AllowSuspend=no
          AllowHibernation=no
          AllowHybridSleep=no
          AllowSuspendThenHibernate=no
          NOSLEEP

          # Also prevent screen lock / DPMS via KDE power settings in skel
          mkdir -p /etc/skel/.config
          cat > /etc/skel/.config/powermanagementprofilesrc << 'POWERRC'
          [AC][DPMSControl]
          idleTime=0
          lockBeforeSleep=false
          turnOffDisplayWhenIdle=false

          [AC][HandleButtonEvents]
          lidAction=0
          powerButtonAction=0
          powerDownAction=0

          [AC][SuspendAndShutdown]
          autoSuspend=false
          autoSuspendAction=0
          autoSuspendIdleTime=0
          POWERRC

          # ── Dracula color scheme ──────────────────────────────────────────

          SKEL_KDE=/etc/skel/.config
          mkdir -p "$SKEL_KDE"

          mkdir -p /usr/share/color-schemes
          cat > /usr/share/color-schemes/Dracula.colors << 'DRACULA_COLORS'
          [ColorEffects:Disabled]
          ChangeSelectionColor=true
          Color=56,56,56
          ColorAmount=0
          ColorEffect=0
