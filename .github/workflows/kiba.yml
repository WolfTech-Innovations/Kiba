name: "KibaOS Build"

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker system prune -af --volumes

      - name: Create build script
        run: |
          cat > build.sh << 'BUILD_SCRIPT_EOF'
          #!/bin/bash
          set -ex
          export DEBIAN_FRONTEND=noninteractive

          # Install live-build
          apt-get update && apt-get install -y \
            live-build debootstrap xorriso git squashfs-tools

          cd /w
          ISO="kibaos-v${RUN_NUM}"

          echo "=== Configuring live-build ==="

          lb config \
            --distribution trixie \
            --architectures amd64 \
            --archive-areas "main contrib non-free non-free-firmware" \
            --debian-installer live \
            --debian-installer-gui false \
            --binary-images iso-hybrid \
            --mode debian \
            --system live \
            --linux-flavours amd64 \
            --linux-packages "linux-image linux-headers" \
            --bootappend-live "boot=live components quiet splash" \
            --bootappend-install "auto=true priority=critical" \
            --iso-application "KibaOS" \
            --iso-volume "KIBAOS" \
            --apt-options "--yes --no-install-recommends" \
            --compression xz \
            --compression-level 9

          # ── Max squashfs compression: XZ with 1M block + 100% dict ──────────
          # live-build exposes compression settings via lb config --compression
          # We override the squashfs hook directly for maximum compression:
          # -comp xz -b 1048576 -Xdict-size 100%
          mkdir -p config/hooks/binary
          cat > config/hooks/binary/0010-squashfs-compression.hook.binary << 'SQFS_HOOK'
          #!/bin/bash
          # Repack the squashfs with maximum XZ compression
          # (1 MiB blocks, 100% dictionary size)
          set -e
          SQFS=$(find binary/live -name "*.squashfs" 2>/dev/null | head -1)
          [ -z "$SQFS" ] && exit 0
          TMPDIR=$(mktemp -d)
          unsquashfs -d "$TMPDIR/root" "$SQFS"
          rm "$SQFS"
          mksquashfs "$TMPDIR/root" "$SQFS" \
            -comp xz \
            -b 1048576 \
            -Xdict-size 100% \
            -no-progress \
            -noappend
          rm -rf "$TMPDIR"
          echo "=== SquashFS repacked with maximum XZ compression ==="
          SQFS_HOOK
          chmod +x config/hooks/binary/0010-squashfs-compression.hook.binary

          # ── UPX binary compression hook ──────────────────────────────────────
          # Compresses all ELF executables in the squashfs with UPX --best.
          # Skips: shared libs (.so), kernel modules (.ko), scripts, Qt/KDE bins
          # that use internal checksums (kwin, plasmashell — UPX breaks them),
          # and anything already compressed or too small (<64KB).
          # NOTE: runs BEFORE the squashfs repack hook so compression stacks.
          mkdir -p config/hooks/live
          cat > config/hooks/live/0050-upx-compress.hook.chroot << 'UPX_HOOK'
          #!/bin/bash
          set -e
          echo "=== UPX: compressing ELF binaries ==="

          # Install upx in chroot if not already present
          which upx >/dev/null 2>&1 || apt-get install -y upx --no-install-recommends 2>/dev/null || true

          if ! which upx >/dev/null 2>&1; then
            echo "UPX not found, skipping binary compression"
            exit 0
          fi

          # Binaries to skip — Qt/KDE internals that break under UPX
          SKIP_PATTERNS="kwin|plasmashell|plasma_session|kded|ksmserver|startplasma|sddm|Xorg|X11|xwayland|python|perl|ruby|node|java|dbus|systemd|udev|plymouth|grub|shim|vmlinuz|initrd"

          find /usr/bin /usr/sbin /usr/lib/kde4 /usr/lib/x86_64-linux-gnu/libexec                /usr/lib/x86_64-linux-gnu/qt6/libexec             -maxdepth 2 -type f -size +65536c 2>/dev/null |           while read -r f; do
            # Skip if matches known-bad patterns
            echo "$f" | grep -qiE "$SKIP_PATTERNS" && continue
            # Only process ELF binaries
            file "$f" 2>/dev/null | grep -q "ELF.*executable" || continue
            # Skip if already UPX-packed
            upx -t "$f" >/dev/null 2>&1 && continue
            # Compress — continue on failure (some ELFs resist UPX)
            upx --best --no-lzma -q "$f" 2>/dev/null || true
          done

          echo "=== UPX compression complete ==="
          UPX_HOOK
          chmod +x config/hooks/live/0050-upx-compress.hook.chroot

          # ── Bazaar app store via Flatpak (first-boot install) ──────────────────
          # Bazaar is GTK4/libadwaita, fully unbranded modern app store.
          # No GNOME session deps needed at runtime — just gtk4 + libadwaita runtimes
          # which Flatpak provides in its own sandbox. Install at first boot via
          # a systemd one-shot that runs after network-online.target.
          cat > config/hooks/live/0055-bazaar-firstboot.hook.chroot << 'BAZAAR_HOOK'
          #!/bin/bash
          set -e

          # ── First-boot service: installs Bazaar from Flathub ──────────────────
          mkdir -p /etc/systemd/system
          cat > /etc/systemd/system/kibaos-install-bazaar.service << 'BAZSVC'
          [Unit]
          Description=KibaOS: Install Bazaar app store from Flathub
          After=network-online.target flatpak.service
          Wants=network-online.target
          ConditionPathExists=!/var/lib/kibaos/.bazaar-installed

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/bin/bash -c ' \
            flatpak remote-add --if-not-exists --system flathub https://dl.flathub.org/repo/flathub.flatpakrepo && \
            flatpak install --system --noninteractive flathub io.github.kolunmi.Bazaar && \
            mkdir -p /var/lib/kibaos && touch /var/lib/kibaos/.bazaar-installed'

          [Install]
          WantedBy=multi-user.target
          BAZSVC

          systemctl enable kibaos-install-bazaar.service 2>/dev/null || true

          # Pre-stage Flathub repo so it's ready immediately on first boot
          flatpak remote-add --if-not-exists --system flathub             https://dl.flathub.org/repo/flathub.flatpakrepo 2>/dev/null || true

          # ── KibaStore .desktop → points to Bazaar (after it installs) ─────────
          mkdir -p /usr/share/applications
          cat > /usr/share/applications/kibastore.desktop << 'KDESKTOP'
          [Desktop Entry]
          Type=Application
          Name=KibaStore
          Comment=Discover and install applications
          Exec=bash -c 'flatpak run io.github.kolunmi.Bazaar 2>/dev/null || notify-send "KibaStore" "Installing app store, please wait..." &'
          Icon=io.github.kolunmi.Bazaar
          Terminal=false
          Categories=System;PackageManager;
          Keywords=store;apps;flatpak;software;
          KDESKTOP

          update-desktop-database /usr/share/applications 2>/dev/null || true
          echo "=== Bazaar first-boot service configured ==="
          BAZAAR_HOOK
          chmod +x config/hooks/live/0055-bazaar-firstboot.hook.chroot

          # ── GRUB: override live-build's default boot menu ─────────────────────
          # live-build generates grub.cfg at binary stage via lb binary_grub_cfg.
          # It reads /etc/default/grub from the CHROOT, not the binary dir.
          # The real fix: place a custom grub.cfg in config/bootloaders/grub-pc/
          # AND patch /etc/default/grub GRUB_DISTRIBUTOR so update-grub uses KibaOS.
          # The binary hook below runs AFTER lb binary_grub_cfg and rewrites the
          # generated grub.cfg to replace all "Debian GNU/Linux" → "KibaOS".
          mkdir -p config/hooks/binary
          cat > config/hooks/binary/0020-grub-branding.hook.binary << 'GRUB_HOOK'
          #!/bin/bash
          set -e
          echo "=== Patching GRUB menu branding ==="

          # live-build writes grub.cfg into binary/boot/grub/grub.cfg
          # Find and patch all instances of Debian branding
          for cfg in             binary/boot/grub/grub.cfg             binary/boot/grub/x86_64-efi/grub.cfg             binary/EFI/boot/grub.cfg; do
            [ -f "$cfg" ] || continue
            sed -i \
              -e 's/Debian GNU\/Linux/KibaOS/g' \
              -e 's/debian live/KibaOS Live/g' \
              -e 's/Debian Live/KibaOS Live/g' \
              -e 's/Live system (amd64)/KibaOS Live/g' \
              -e 's/menuentry "Debian/menuentry "KibaOS/g' \
              "$cfg"
            echo "  Patched: $cfg"
          done

          # Also patch any isolinux/syslinux boot screens
          for txt in             binary/isolinux/isolinux.cfg             binary/isolinux/live.cfg             binary/isolinux/install.cfg; do
            [ -f "$txt" ] || continue
            sed -i \
              -e 's/Debian GNU\/Linux/KibaOS/g' \
              -e 's/Debian Live/KibaOS Live/g' \
              "$txt"
            echo "  Patched: $txt"
          done

          echo "=== GRUB branding patch complete ==="
          GRUB_HOOK
          chmod +x config/hooks/binary/0020-grub-branding.hook.binary

          echo "=== Adding packages ==="

          mkdir -p config/package-lists
          cat > config/package-lists/kde.list.chroot << 'PACKAGES'
          # Base system
          linux-image-amd64
          firmware-linux-free
          firmware-linux-nonfree
          systemd-sysv
          sudo
          ca-certificates
          openssl

          # Network
          network-manager
          wpasupplicant
          wget
          curl
          git
          apt-transport-https

          # KDE Plasma 6 (Debian 13 trixie) — minimal working set
          # kde-standard is intentionally excluded: it pulls in ~800MB of extras
          # including kdepim, kdeedu, kdeutils we don't need. We list exactly what
          # we need so the ISO stays lean.
          kde-plasma-desktop
          plasma-desktop
          plasma-workspace
          sddm
          sddm-theme-debian-breeze
          plasma-nm
          plasma-pa
          dolphin
          konsole
          ark
          qt6-svg-plugins
          desktop-file-utils
          # Plasma addons — explicit packages instead of the kde-standard metapkg:
          #   plasma-widgets-addons → replaced by plasma-workspace-wallpapers below
          #   kdeplasma-addons      → replaced by individual components
          plasma-workspace-wallpapers
          plasma-wallpapers-addons
          kwin-addons
          breeze
          breeze-gtk-theme

          # Flatpak support
          flatpak
          xdg-desktop-portal-kde
          # Bazaar app store installed via flatpak at first boot (see hook below)
          # upx for binary compression
          upx

          # Shell - zsh
          zsh
          zsh-autosuggestions
          zsh-syntax-highlighting

          # Boot splash
          plymouth
          plymouth-themes
          kde-config-plymouth

          # ── Calamares installer + all confirmed runtime dependencies (trixie) ──
          # Confirmed from packages.debian.org/trixie/calamares:
          calamares
          calamares-settings-debian
          # Calamares hard deps pulled automatically by apt, but list explicitly
          # so live-build doesn't strip them during chroot:
          libkpmcore12
          libparted2t64
          libpwquality1
          libpython3.13
          libqt6core6t64
          libqt6dbus6
          libqt6gui6
          libqt6network6
          libqt6qml6
          libqt6quick6
          libqt6quickwidgets6
          libqt6svg6
          libqt6widgets6
          libqt6xml6
          # QML modules calamares slideshow requires at runtime:
          qml6-module-qtquick
          qml6-module-qtquick-controls
          qml6-module-qtquick-layouts
          qml6-module-qtquick-window
          qml6-module-qtqml
          # Keyboard layout detection (used by keyboard module)
          # Python modules for calamares Python jobs:
          python3-pyqt6
          python3-dbus

          # ── Browsers / media ──────────────────────────────────────────────────
          firefox-esr

          # Essential tools
          nano
          htop
          python3

          # Filesystems
          ntfs-3g
          exfatprogs

          # Boot loader
          grub-efi-amd64
          grub-pc-bin

          # Squashfs tools (needed in chroot for overlay script)
          squashfs-tools

          # OverlayFS / read-only FS support (systemd-based)
          overlayroot
          PACKAGES

          echo "=== Creating live customization hook ==="

          mkdir -p config/hooks/live
          cat > config/hooks/live/0100-customize.hook.chroot << 'HOOK'
          #!/bin/bash
          set -e

          # ── Plymouth theme setup ──────────────────────────────────────────

          mkdir -p /usr/share/kibaos
          mkdir -p /usr/share/plymouth/themes/kibaos-spinner

          # Encode the actual KibaOS logo (uploaded PNG) as base64 for embedding.
          # The logo is the dark navy geometric arrow/chevron mark on white background.
          # We convert it: invert to white-on-dark for the dark Plymouth background,
          # then embed it. The raw PNG is also copied for use in Calamares branding.
          if [ -f /tmp/kibaos-logo-original.png ]; then
            # Use the logo as-is (already dark navy on white — fine for Calamares)
            cp /tmp/kibaos-logo-original.png /usr/share/kibaos/logo.png

            # For Plymouth (dark #282a36 background) we need a white version:
            # Invert the logo colours so the mark shows white on transparent/dark.
            if command -v convert >/dev/null 2>&1; then
              convert /tmp/kibaos-logo-original.png \
                -channel RGB -negate \
                -background "#282a36" -alpha remove \
                /usr/share/kibaos/logo-plymouth.png 2>/dev/null || \
                cp /usr/share/kibaos/logo.png /usr/share/kibaos/logo-plymouth.png
            else
              cp /usr/share/kibaos/logo.png /usr/share/kibaos/logo-plymouth.png
            fi
          fi

          # Fallback: decode the embedded base64 logo if file wasn't pre-staged
          if [ ! -f /usr/share/kibaos/logo.png ]; then
              cat > /tmp/logo_b64.txt << 'LOGO_B64'
          
          LOGO_B64
            base64 -d /tmp/logo_b64.txt > /usr/share/kibaos/logo.png
            rm /tmp/logo_b64.txt
            cp /usr/share/kibaos/logo.png /usr/share/kibaos/logo-plymouth.png
          fi

          # ── Plymouth theme — logo-based boot splash ───────────────────────
          # Uses the 'script' Plymouth module which gives us full control.
          # Layout: dark Dracula bg, KibaOS logo centred, thin progress bar,
          # "KibaOS" text label, spinner dots beneath logo.

          cat > /usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.plymouth << 'PLYMOUTH_THEME'
          [Plymouth Theme]
          Name=KibaOS
          Description=KibaOS boot splash
          ModuleName=script

          [script]
          ImageDir=/usr/share/plymouth/themes/kibaos-spinner
          ScriptFile=/usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.script
          PLYMOUTH_THEME

          # Plymouth script — logo centred, animated dot-pulse progress bar
          # Dracula bg: R=0.157 G=0.165 B=0.212  (#282a36)
          # Dracula purple: R=0.741 G=0.576 B=0.976  (#bd93f9)
          cat > /usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.script << 'PLYMOUTH_SCRIPT'
          # ── Background ─────────────────────────────────────────────────────
          Window.SetBackgroundTopColor(0.157, 0.165, 0.212);
          Window.SetBackgroundBottomColor(0.157, 0.165, 0.212);

          screen_width  = Window.GetWidth();
          screen_height = Window.GetHeight();
          cx = screen_width  / 2;
          cy = screen_height / 2;

          # ── Logo ────────────────────────────────────────────────────────────
          logo.image  = Image("logo.png");
          # Scale logo to ~160px wide, maintain aspect
          logo_target_w = 160;
          logo_scale    = logo_target_w / logo.image.GetWidth();
          logo.scaled   = logo.image.Scale(
                            Math.Int(logo.image.GetWidth()  * logo_scale),
                            Math.Int(logo.image.GetHeight() * logo_scale));
          logo.sprite   = Sprite(logo.scaled);
          logo.x = cx - logo.scaled.GetWidth()  / 2;
          logo.y = cy - logo.scaled.GetHeight() / 2 - 60;
          logo.sprite.SetPosition(logo.x, logo.y, 1);

          # ── "KibaOS" label beneath logo ─────────────────────────────────────
          label.image  = Image.Text("KibaOS", 0.741, 0.576, 0.976,
                                    1, "Sans Bold 20");
          label.sprite = Sprite(label.image);
          label.sprite.SetPosition(
            cx - label.image.GetWidth() / 2,
            logo.y + logo.scaled.GetHeight() + 16,
            1);

          # ── "Switch to Simple" tagline ───────────────────────────────────────
          tag.image  = Image.Text("Switch to Simple", 0.384, 0.447, 0.643,
                                  1, "Sans 13");
          tag.sprite = Sprite(tag.image);
          tag.sprite.SetPosition(
            cx - tag.image.GetWidth() / 2,
            logo.y + logo.scaled.GetHeight() + 48,
            1);

          # ── Progress bar (thin, 400px wide) ─────────────────────────────────
          bar_w = 400;
          bar_h = 4;
          bar_x = cx - bar_w / 2;
          bar_y = cy + logo.scaled.GetHeight() / 2 + 70;

          # Background track (dark grey)
          bar_bg.image  = Image(bar_w, bar_h);
          bar_bg.image.FillWithColor(0.267, 0.278, 0.349, 1.0);
          bar_bg.sprite = Sprite(bar_bg.image);
          bar_bg.sprite.SetPosition(bar_x, bar_y, 1);

          # Filled progress
          bar_fg.image  = Image(1, bar_h);
          bar_fg.image.FillWithColor(0.741, 0.576, 0.976, 1.0);
          bar_fg.sprite = Sprite(bar_fg.image);
          bar_fg.sprite.SetPosition(bar_x, bar_y, 2);
          bar_fg.width  = 1;

          fun progress_callback(duration, progress) {
              new_w = Math.Int(bar_w * progress);
              if (new_w < 1) { new_w = 1; }
              if (new_w != bar_fg.width) {
                  bar_fg.image  = Image(new_w, bar_h);
                  bar_fg.image.FillWithColor(0.741, 0.576, 0.976, 1.0);
                  bar_fg.sprite.SetImage(bar_fg.image);
                  bar_fg.width = new_w;
              }
          }
          Plymouth.SetBootProgressFunction(progress_callback);

          # ── Status message (bottom-left, small) ──────────────────────────────
          msg.sprite = Sprite();
          msg.sprite.SetPosition(16, screen_height - 36, 10);
          fun message_callback(text) {
              msg.image = Image.Text(text, 0.596, 0.631, 0.784, 1, "Sans 11");
              msg.sprite.SetImage(msg.image);
          }
          Plymouth.SetMessageFunction(message_callback);
          PLYMOUTH_SCRIPT

          # Use the logo-plymouth (white/inverted) for the boot screen
          cp /usr/share/kibaos/logo-plymouth.png \
             /usr/share/plymouth/themes/kibaos-spinner/logo.png

          # Keep spinner PNGs for compatibility (some plymouth builds need them)
          if [ -d /usr/share/plymouth/themes/spinner ]; then
              cp /usr/share/plymouth/themes/spinner/spinner-*.png \
                 /usr/share/plymouth/themes/kibaos-spinner/ 2>/dev/null || true
          fi

          update-alternatives --install \
            /usr/share/plymouth/themes/default.plymouth default.plymouth \
            /usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.plymouth 100
          update-alternatives --set default.plymouth \
            /usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.plymouth

          # Rebuild initramfs so plymouth theme actually loads on boot
          update-initramfs -u -k all || update-initramfs -u

          # ── GRUB branding — full overwrite ────────────────────────────────
          # live-build generates a default /etc/default/grub that shows the
          # generic Debian iso-builder GRUB menu. We overwrite it completely
          # so KibaOS branding is in control from the start.
          # We also install a GRUB theme (custom colours + KibaOS title) by
          # writing a theme.txt into /boot/grub/themes/kibaos/.

          cat > /etc/default/grub << 'GRUB_CONFIG'
          GRUB_DEFAULT=0
          GRUB_TIMEOUT=5
          GRUB_TIMEOUT_STYLE=menu
          GRUB_DISTRIBUTOR="KibaOS"
          GRUB_CMDLINE_LINUX_DEFAULT="quiet splash loglevel=3 rd.udev.log_priority=3"
          GRUB_CMDLINE_LINUX=""
          GRUB_GFXMODE=1920x1080,1280x720,auto
          GRUB_GFXPAYLOAD_LINUX=keep
          GRUB_COLOR_NORMAL="light-cyan/black"
          GRUB_COLOR_HIGHLIGHT="black/light-cyan"
          GRUB_THEME="/boot/grub/themes/kibaos/theme.txt"
          GRUB_TERMINAL_OUTPUT="gfxterm"
          GRUB_DISABLE_OS_PROBER=false
          GRUB_CONFIG

          # ── KibaOS GRUB theme ─────────────────────────────────────────────
          # Dracula-palette GRUB theme — no external assets needed, pure text.
          mkdir -p /boot/grub/themes/kibaos

          cat > /boot/grub/themes/kibaos/theme.txt << 'GRUBTHEME'
          # KibaOS GRUB Theme — Dracula-palette, minimal

          title-text: "KibaOS"
          title-font: "Sans Bold 22"
          title-color: "#bd93f9"

          desktop-color: "#282a36"
          desktop-image: ""

          + label {
              left = 50%-200
              top = 15%
              width = 400
              height = 40
              text = "KibaOS — Switch to Simple"
              font = "Sans Bold 18"
              color = "#f8f8f2"
              align = "center"
          }

          + label {
              left = 50%-200
              top = 23%
              width = 400
              height = 28
              text = "Built on Debian 13 Trixie"
              font = "Sans 14"
              color = "#6272a4"
              align = "center"
          }

          + boot_menu {
              left = 50%-250
              top = 35%
              width = 500
              height = 280
              item_font = "Sans 14"
              item_color = "#f8f8f2"
              selected_item_font = "Sans Bold 14"
              selected_item_color = "#282a36"
              selected_item_pixmap_style = ""
              selected_item_bg_color = "#bd93f9"
              icon_width = 0
              icon_height = 0
              item_height = 36
              item_padding = 10
              item_icon_space = 0
              scrollbar = false
          }

          + progress_bar {
              id = "__timeout__"
              left = 50%-250
              top = 82%
              width = 500
              height = 8
              bg_color = "#44475a"
              fg_color = "#bd93f9"
              border_color = "#44475a"
              bar_style = "progress_bar"
              highlight_style = "progress_bar"
          }

          + label {
              left = 50%-250
              top = 87%
              width = 500
              height = 24
              text = "Use ↑↓ to navigate  |  Enter to boot  |  e to edit"
              font = "Sans 12"
              color = "#6272a4"
              align = "center"
          }
          GRUBTHEME

          # live-build also generates isolinux/grub.cfg for the ISO boot menu.
          # Override the live boot menu title while we're here.
          if [ -f /boot/grub/grub.cfg ]; then
            sed -i 's/Debian GNU\/Linux/KibaOS/g'  /boot/grub/grub.cfg || true
            sed -i 's/debian/kibaos/gi'             /boot/grub/grub.cfg || true
          fi

          # Also patch the live-build EFI grub stub title
          for f in /usr/share/live/build/bootloaders/grub-efi/grub.cfg \
                   /usr/share/live/build/bootloaders/grub-pc/grub.cfg; do
            [ -f "$f" ] && sed -i 's/Debian GNU\/Linux/KibaOS/g' "$f" || true
          done

          # ── SDDM autologin for live session ───────────────────────────────

          mkdir -p /etc/sddm.conf.d
          cat > /etc/sddm.conf.d/autologin.conf << 'SDDM_CONF'
          [Autologin]
          User=user
          Session=plasma
          SDDM_CONF

          # ── Default shell: zsh ────────────────────────────────────────────

          chsh -s /bin/zsh user  2>/dev/null || true
          chsh -s /bin/zsh root  2>/dev/null || true

          cat > /etc/zsh/zshrc << 'ZSHRC'
          # KibaOS system-wide zshrc
          export LANG=en_US.UTF-8
          export EDITOR=nano

          HISTSIZE=10000
          SAVEHIST=10000
          HISTFILE=~/.zsh_history
          setopt SHARE_HISTORY
          setopt HIST_IGNORE_DUPS

          autoload -Uz compinit && compinit
          zstyle ':completion:*' menu select

          autoload -Uz vcs_info
          precmd() { vcs_info }
          PROMPT='%F{#bd93f9}%n@%m%f %F{#f8f8f2}%~%f %F{#bd93f9}❯%f '

          source /usr/share/zsh-autosuggestions/zsh-autosuggestions.zsh 2>/dev/null || true
          source /usr/share/zsh-syntax-highlighting/zsh-syntax-highlighting.zsh 2>/dev/null || true

          alias ls='ls --color=auto'
          alias ll='ls -lah'
          alias update='sudo apt update && sudo apt upgrade -y'
          alias install='sudo apt install'
          ZSHRC

          # ── Live user setup ───────────────────────────────────────────────

          if ! id -u user >/dev/null 2>&1; then
            useradd -m -s /bin/zsh -G sudo,audio,video,netdev,plugdev user
            echo "user:live" | chpasswd
          else
            usermod -s /bin/zsh user
          fi

          echo "user ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/live-user
          chmod 440 /etc/sudoers.d/live-user

          # ── Disable sleep / suspend ───────────────────────────────────────
          mkdir -p /etc/systemd/sleep.conf.d
          cat > /etc/systemd/sleep.conf.d/nosleep.conf << 'NOSLEEP'
          [Sleep]
          AllowSuspend=no
          AllowHibernation=no
          AllowHybridSleep=no
          AllowSuspendThenHibernate=no
          NOSLEEP

          mkdir -p /etc/skel/.config
          cat > /etc/skel/.config/powermanagementprofilesrc << 'POWERRC'
          [AC][DPMSControl]
          idleTime=0
          lockBeforeSleep=false
          turnOffDisplayWhenIdle=false

          [AC][HandleButtonEvents]
          lidAction=0
          powerButtonAction=0
          powerDownAction=0

          [AC][SuspendAndShutdown]
          autoSuspend=false
          autoSuspendAction=0
          autoSuspendIdleTime=0
          POWERRC

          # ─────────────────────────────────────────────────────────────────
          # ── THEMING SECTION ───────────────────────────────────────────────
          # Order: Theme → Wallpaper → Icons (Kora) → Cursor (Vimix)
          # Everything done via config files / /etc/skel placement.
          # No qdbus/lookandfeeltool commands used — pure INI config files.
          # ─────────────────────────────────────────────────────────────────

          # ── A. Install Ant-Dark KDE plasma desktop theme ──────────────────
          # Ant-Dark by EliverLara — a dark vibrant plasma style.
          # KDE Store: https://store.kde.org/p/1464285
          # Installed system-wide to /usr/share/plasma/desktoptheme/
          mkdir -p /usr/share/plasma/desktoptheme/ant-dark
          git clone --depth=1 https://github.com/EliverLara/Ant-Themes \
            /tmp/ant-themes 2>/dev/null || true

          # Ant-Themes repo has Plasma and KDE colour scheme subfolders.
          # If the git clone succeeded, install the plasma theme.
          if [ -d /tmp/ant-themes/Plasma/Ant-Dark ]; then
            cp -r /tmp/ant-themes/Plasma/Ant-Dark/. \
              /usr/share/plasma/desktoptheme/ant-dark/
          fi

          # Fallback: create a minimal Ant-Dark metadata.json that
          # inherits from breeze-dark so the theme name is registered.
          if [ ! -f /usr/share/plasma/desktoptheme/ant-dark/metadata.json ]; then
            cat > /usr/share/plasma/desktoptheme/ant-dark/metadata.json << 'ANTMETA'
          {
            "KPlugin": {
              "Authors": [ { "Name": "EliverLara", "Email": "" } ],
              "Category": "",
              "Description": "Ant Dark — a vibrant dark KDE Plasma style",
              "EnabledByDefault": true,
              "Id": "ant-dark",
              "License": "GPL",
              "Name": "Ant Dark",
              "Version": "1.0",
              "Website": "https://store.kde.org/p/1464285"
            },
            "X-Plasma-API": "5.0"
          }
          ANTMETA
          fi

          # Also install the Ant-Dark colour scheme
          mkdir -p /usr/share/color-schemes
          if [ -f /tmp/ant-themes/colors/Ant-Dark.colors ]; then
            cp /tmp/ant-themes/colors/Ant-Dark.colors \
              /usr/share/color-schemes/AntDark.colors
          fi
          rm -rf /tmp/ant-themes

          # ── B. Install Watch_Dogs KDE splash screen ───────────────────────
          # KDE Store: https://store.kde.org/p/1417004
          # Splash screens live in /usr/share/plasma/look-and-feel/<id>/contents/splash
          # We create the package structure manually (no network install possible
          # at build time without the KDE store API).
          # The splash is registered as a standalone look-and-feel package so
          # ksplashqml can find it.
          mkdir -p /usr/share/plasma/look-and-feel/com.kibaos.watchdogs.desktop/contents/splash/images

          cat > /usr/share/plasma/look-and-feel/com.kibaos.watchdogs.desktop/metadata.json << 'WATCHMETA'
