          Engine=KSplashQML
          Theme=com.kibaos.watchdogs.desktop
          KSPLASHRC

          # H-5. cursors — set Vimix via kcminputrc and index.theme
          cat > "$SKEL_KDE/kcminputrc" << 'KCMINPUTRC'
          [Mouse]
          cursorTheme=Vimix-cursors
          cursorSize=24
          KCMINPUTRC

          # System-wide cursor default via /etc/alternatives or index.theme
          mkdir -p /usr/share/icons/default
          cat > /usr/share/icons/default/index.theme << 'CURSOR_DEFAULT'
          [Icon Theme]
          Inherits=Vimix-cursors
          CURSOR_DEFAULT

          # H-6. KWin: compositing + rounded corners (12px)
          cat > "$SKEL_KDE/kwinrc" << 'KWINRC'
          [Compositing]
          Enabled=true
          Backend=OpenGL
          GLCore=true
          HiddenPreviews=5
          OpenGLIsUnsafe=false

          [Effect-overview]
          BorderActivate=7

          [Plugins]
          blurEnabled=true
          contrastEnabled=true
          kwin4_effect_dimscreenEnabled=false
          slideEnabled=true
          wobblywindowsEnabled=false

          [Windows]
          RoundedCorners=true

          [org.kde.kdecoration2]
          ButtonsOnLeft=
          ButtonsOnRight=IAX
          library=org.kde.breeze
          theme=__aurorae__svg__Dracula
          BorderSize=None
          BorderSizeAuto=false

          [Script-roundedwindows]
          CornerRadius=12
          KWINRC

          # H-7. Breeze decoration: Dracula shadow colour
          cat > "$SKEL_KDE/breezerc" << 'BREEZERC'
          [Common]
          ShadowColor=189,147,249
          ShadowSize=ShadowVeryLarge
          ShadowStrength=80

          [Windeco Exception 0]
          BorderSize=None
          Enabled=true
          ExceptionPattern=.*
          ExceptionType=0
          HideTitleBar=false
          Mask=2
          BREEZERC

          # ─────────────────────────────────────────────────────────────────
          # ── I. Panel layout: BOTTOM, with Kickoff + Tasks + WiFi +
          #       Battery + System Tray + Clock; Desktop visualizer widget
          # ─────────────────────────────────────────────────────────────────

          cat > "$SKEL_KDE/plasmashellrc" << 'PLASMASHELLRC'
          [PlasmaViews][Panel 2][Defaults]
          thickness=44

          [PlasmaViews][Panel 2][Horizontal1920]
          thickness=44
          PLASMASHELLRC

          # Panel at BOTTOM (location=4), with:
          # - Kickoff app launcher
          # - Icon-only task manager
          # - Spacer
          # - Network status (WiFi) widget
          # - Battery widget
          # - System tray (contains additional status icons)
          # - Digital clock
          # Desktop: Calamares, Firefox, Trash icons + Panon audio visualizer
          cat > "$SKEL_KDE/plasma-org.kde.plasma.desktop-appletsrc" << 'PANELRC'
          [Containments][1]
          activityId=
          formfactor=0
          immutability=1
          lastScreen=0
          location=0
          plugin=org.kde.plasma.folder
          wallpaperplugin=org.kde.image

          [Containments][1][Wallpaper][org.kde.image][General]
          Image=file:///usr/share/wallpapers/Next/contents/images/5120x2880.png
          SlideshowInterval=0

          [Containments][1][Applets][10]
          immutability=1
          plugin=org.kde.plasma.icon

          [Containments][1][Applets][10][Configuration][General]
          applicationName=org.mozilla.firefox
          iconPath=/usr/share/applications/firefox-esr.desktop
          label=Firefox

          [Containments][1][Applets][10][Geometry]
          x=80
          y=40
          width=64
          height=64

          [Containments][1][Applets][11]
          immutability=1
          plugin=org.kde.plasma.icon

          [Containments][1][Applets][11][Configuration][General]
          applicationName=calamares
          iconPath=/usr/share/applications/calamares.desktop
          label=Install KibaOS

          [Containments][1][Applets][11][Geometry]
          x=10
          y=40
          width=64
          height=64

          [Containments][1][Applets][12]
          immutability=1
          plugin=org.kde.plasma.trash

          [Containments][1][Applets][12][Geometry]
          x=150
          y=40
          width=64
          height=64

          [Containments][1][Applets][13]
          immutability=1
          plugin=org.kde.plasma.notes

          [Containments][1][Applets][13][Geometry]
          x=-80
          y=60
          width=200
          height=200

          [Containments][1][Applets][14]
          immutability=1
          plugin=panon

          [Containments][1][Applets][14][Geometry]
          x=250
          y=60
          width=400
          height=120

          [Containments][2]
          activityId=
          formfactor=2
          immutability=1
          lastScreen=0
          location=4
          plugin=org.kde.panel
          wallpaperplugin=org.kde.image

          [Containments][2][General]
          floating=0

          [Containments][2][Applets][3]
          immutability=1
          plugin=org.kde.plasma.kickoff

          [Containments][2][Applets][3][Configuration][General]
          icon=start-here-kde-symbolic

          [Containments][2][Applets][4]
          immutability=1
          plugin=org.kde.plasma.icontasks

          [Containments][2][Applets][5]
          immutability=1
          plugin=org.kde.plasma.marginsseparator

          [Containments][2][Applets][6]
          immutability=1
          plugin=org.kde.plasma.networkmanagement

          [Containments][2][Applets][7]
          immutability=1
          plugin=org.kde.plasma.battery

          [Containments][2][Applets][8]
          immutability=1
          plugin=org.kde.plasma.systemtray

          [Containments][2][Applets][9]
          immutability=1
          plugin=org.kde.plasma.digitalclock

          [Containments][2][Layout]
          AppletOrder=3;4;5;6;7;8;9
          PANELRC

          # ── J. Lock screen wallpaper matches Path / Next ──────────────────
          cat > "$SKEL_KDE/kscreenlockerrc" << 'LOCKRC'
          [Daemon]
          Autolock=false
          LockOnResume=false
          Timeout=0

          [Greeter][Wallpaper][org.kde.image][General]
          Image=file:///usr/share/wallpapers/Next/contents/images/5120x2880.png
          LOCKRC

          # ── K. Copy skel → live user ──────────────────────────────────────
          cp -rn /etc/skel/. /home/user/ 2>/dev/null || true
          chown -R user:user /home/user/.config /home/user/.local 2>/dev/null || true

          # ── L. Services ───────────────────────────────────────────────────

          systemctl enable sddm          || true
          systemctl enable NetworkManager || true
          systemctl enable plymouth      || true

          # ── M. System identity ────────────────────────────────────────────

          echo "kibaos-live" > /etc/hostname

          cat > /etc/os-release << 'EOF'
          NAME="KibaOS"
          ID=kibaos
          ID_LIKE=debian
          VERSION_ID="1.0"
          PRETTY_NAME="KibaOS 1.0"
          HOME_URL="https://github.com/WolfTech-Innovations/kibaos"
          SUPPORT_URL="https://github.com/WolfTech-Innovations/kibaos/issues"
          BUG_REPORT_URL="https://github.com/WolfTech-Innovations/kibaos/issues"
          EOF

          cat > /etc/issue << 'EOF'
          KibaOS \r (\l)

          EOF

          cat > /etc/motd << 'EOF'

           _  ___ _             ___  ____
          | |/ (_) |__   __ _ / _ \/ ___|
          | ' /| | '_ \ / _` | | | \___ \
          | . \| | |_) | (_| | |_| |___) |
          |_|\_\_|_.__/ \__,_|\___/|____/

          Welcome to KibaOS — built on Debian 13 Trixie

          EOF

          # ── N. Rename Discover → KibaStore ───────────────────────────────
          # Override the Discover .desktop file to rename it "KibaStore".
          # We do this by placing a higher-priority .desktop file override
          # in /usr/local/share/applications/ (takes precedence over
          # /usr/share/applications/ per XDG spec).
          mkdir -p /usr/local/share/applications
          DISCOVER_SRC=""
          for f in /usr/share/applications/org.kde.discover.desktop \
                   /usr/share/applications/plasma-discover.desktop \
                   /usr/share/applications/discover.desktop; do
            [ -f "$f" ] && DISCOVER_SRC="$f" && break
          done

          if [ -n "$DISCOVER_SRC" ]; then
            DISCOVER_BASENAME=$(basename "$DISCOVER_SRC")
            cp "$DISCOVER_SRC" "/usr/local/share/applications/$DISCOVER_BASENAME"
            # Replace all Name= lines with KibaStore
            sed -i 's/^Name=.*/Name=KibaStore/' \
              "/usr/local/share/applications/$DISCOVER_BASENAME"
            sed -i 's/^Name\[.*\]=.*//' \
              "/usr/local/share/applications/$DISCOVER_BASENAME"
            # Update desktop-file database
            update-desktop-database /usr/local/share/applications 2>/dev/null || true
          fi

          # Also patch the appdata / appstream entry if it exists
          for f in /usr/share/metainfo/org.kde.discover.appdata.xml \
                   /usr/share/appdata/org.kde.discover.appdata.xml; do
            if [ -f "$f" ]; then
              # Create override in /usr/local/share/metainfo
              mkdir -p /usr/local/share/metainfo
              cp "$f" "/usr/local/share/metainfo/$(basename $f)"
              sed -i 's|<name>Discover</name>|<name>KibaStore</name>|g' \
                "/usr/local/share/metainfo/$(basename $f)"
            fi
          done

          # Add Flathub as default Flatpak remote in skel
          mkdir -p /etc/skel/.local/share/flatpak/remotes
          cat > /etc/skel/.local/share/flatpak/remotes/flathub.flatpakrepo << 'FLATHUBREPO'
          [Flatpak Repo]
          Title=Flathub
          Url=https://dl.flathub.org/repo/
          Homepage=https://flathub.org
          Comment=Central repository of Flatpak applications
          Description=Central repository of Flatpak applications
          Icon=https://dl.flathub.org/repo/logo.svg
          GPGKey=mQINBFlD2sABEADsiUZUO...
          FLATHUBREPO
          # Also add Flathub system-wide via hook (requires internet at runtime)
          cat > /etc/profile.d/flatpak-flathub.sh << 'FPHUB'
          # Add Flathub remote for Flatpak on first boot if not already added
          if flatpak remote-list 2>/dev/null | grep -q flathub; then
            true
          else
            flatpak remote-add --if-not-exists flathub \
              https://flathub.org/repo/flathub.flatpakrepo 2>/dev/null || true
          fi
          FPHUB
          chmod +x /etc/profile.d/flatpak-flathub.sh

          HOOK

          chmod +x config/hooks/live/0100-customize.hook.chroot

          echo "=== Creating Calamares config ==="

          mkdir -p config/includes.chroot/etc/calamares/branding/kibaos
          cat > config/includes.chroot/etc/calamares/branding/kibaos/branding.desc << 'BRANDING'
          componentName: kibaos
          welcomeStyleCalamares: true
          welcomeExpandingLogo: true
          slideshowAPI: 2
          strings:
            productName: KibaOS
            shortProductName: KibaOS
            version: "1.0"
            shortVersion: "1.0"
            versionedName: "KibaOS 1.0"
            shortVersionedName: "KibaOS 1.0"
            bootloaderEntryName: KibaOS
            productUrl: https://github.com/WolfTech-Innovations/kibaos
            supportUrl: https://github.com/WolfTech-Innovations/kibaos/issues
            knownIssuesUrl: https://github.com/WolfTech-Innovations/kibaos/issues
            releaseNotesUrl: https://github.com/WolfTech-Innovations/kibaos
          images:
            productLogo: logo.png
            productIcon: logo.png
            productWelcome: welcome.png
          slideshow: show.qml
          BRANDING

          mkdir -p config/hooks/live
          cat > config/hooks/live/0110-calamares-branding.hook.chroot << 'BRANDING_HOOK'
          #!/bin/bash
          set -e
          mkdir -p /etc/calamares/branding/kibaos
          cp /usr/share/kibaos/logo.png /etc/calamares/branding/kibaos/logo.png
          cp /usr/share/kibaos/logo.png /etc/calamares/branding/kibaos/welcome.png

          # Point Calamares at our branding
          if [ -f /etc/calamares/settings.conf ]; then
            sed -i 's/branding: .*/branding: kibaos/' /etc/calamares/settings.conf
          fi

          # ── Calamares show.qml slideshow ──────────────────────────────────
          # Slides say "KibaOS | Switch to simple" per spec
          cat > /etc/calamares/branding/kibaos/show.qml << 'SHOWQML'
          import calamares.slideshow 1.0;

          Presentation {
              id: presentation

              Timer {
                  interval: 5000
                  running: presentation.activatedInCalamares
                  repeat: true
                  onTriggered: presentation.goToNextSlide()
              }

              Slide {
                  centeredText: "KibaOS | Switch to simple\n\nFast, beautiful, built on Debian 13 Trixie."
              }

              Slide {
                  centeredText: "KibaOS | Switch to simple\n\nKDE Plasma 6 — a powerful desktop crafted for you."
              }

              Slide {
                  centeredText: "KibaOS | Switch to simple\n\nInstallation in progress… won't take long!"
              }

              function onActivate() { presentation.currentSlide = 0; }
              function onLeave() {}
          }
          SHOWQML

          # ── Calamares .desktop launcher on desktop ────────────────────────
          mkdir -p /usr/share/applications
          cat > /usr/share/applications/calamares.desktop << 'CALADESKTOP'
          [Desktop Entry]
          Type=Application
          Version=1.0
          Name=Install KibaOS
          Comment=Install KibaOS to your system
          Exec=sudo calamares
          Icon=calamares
          Terminal=false
          Categories=System;
          CALADESKTOP

          # ── Apply post-install hook: copy settings to installed system ─────
          mkdir -p /etc/calamares/modules
          cat > /etc/calamares/modules/postinstall.conf << 'POSTINSTALL'
          ---
          script:
            - /usr/share/kibaos/post-install.sh
          POSTINSTALL

          mkdir -p /usr/share/kibaos
          cat > /usr/share/kibaos/post-install.sh << 'POSTINSTALLSH'
          #!/bin/bash
          # Runs inside installed system — copy all KibaOS settings to new user
          TARGET_HOME="$1"
          [ -z "$TARGET_HOME" ] && TARGET_HOME="/home/$(getent passwd 1000 | cut -d: -f1)"
          [ -z "$TARGET_HOME" ] && exit 0

          cp -rn /etc/skel/. "$TARGET_HOME/" 2>/dev/null || true
          chown -R "$(stat -c '%U:%G' "$TARGET_HOME")" \
            "$TARGET_HOME/.config" "$TARGET_HOME/.local" 2>/dev/null || true

          # Re-add Flathub on installed system
          flatpak remote-add --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo 2>/dev/null || true
          POSTINSTALLSH
          chmod +x /usr/share/kibaos/post-install.sh

          BRANDING_HOOK
          chmod +x config/hooks/live/0110-calamares-branding.hook.chroot

          echo "=== Installing Liquorix kernel (prepackaged) ==="

          # Liquorix is a prebuilt Zen-based kernel with binary .deb packages
          # distributed via liquorix.net/debian — no compilation required.
          # The official install script adds the apt repo and installs the debs.
          cat > config/hooks/live/0120-liquorix-kernel.hook.chroot << 'LIQUORIX_HOOK'
          #!/bin/bash
          set -e

          echo "=== Installing Liquorix kernel from prepackaged repo ==="

          # Add the Liquorix APT repository and GPG key
          mkdir -p /etc/apt/sources.list.d /etc/apt/trusted.gpg.d

          curl -fsSL https://liquorix.net/liquorix-keyring.gpg \
            -o /etc/apt/trusted.gpg.d/liquorix-keyring.gpg || {
            echo "WARNING: Could not download Liquorix keyring — skipping"
            exit 0
          }

          # lsb_release may not be available; use /etc/os-release instead
          CODENAME=$(grep "^VERSION_CODENAME" /etc/os-release \
                     | cut -d= -f2 | tr -d '"' || echo "trixie")

          cat > /etc/apt/sources.list.d/liquorix.list << LIQSRC
          deb https://liquorix.net/debian ${CODENAME} main
          LIQSRC

          apt-get update -qq

          # Install the prebuilt Liquorix kernel packages
          apt-get install -y --no-install-recommends \
            linux-image-liquorix-amd64 \
            linux-headers-liquorix-amd64 || {
            echo "WARNING: Liquorix install failed — keeping stock kernel"
            exit 0
          }

          # Set Liquorix as the default boot kernel in GRUB
          LIQVER=$(ls /boot/vmlinuz-*liquorix* 2>/dev/null \
                   | sort -V | tail -1 \
                   | sed 's|/boot/vmlinuz-||' || true)

          if [ -n "$LIQVER" ]; then
            echo "Liquorix kernel installed: $LIQVER"
            # Set GRUB to boot into Liquorix by default
            sed -i "s/GRUB_DEFAULT=.*/GRUB_DEFAULT=\"Advanced options for KibaOS>KibaOS, with Linux ${LIQVER}\"/" \
              /etc/default/grub 2>/dev/null || true
            update-initramfs -c -k "$LIQVER" 2>/dev/null \
              || update-initramfs -u
          fi

          # Remove the stock amd64 kernel to save space on the ISO
          # (keep it as a fallback package but remove the image)
          echo "=== Liquorix kernel installed successfully ==="
          LIQUORIX_HOOK
          chmod +x config/hooks/live/0120-liquorix-kernel.hook.chroot

          echo "=== Creating SteamOS-style read-only FS overlay ==="

          # SteamOS-style immutable root:
          # - / is mounted read-only from squashfs
          # - /etc is a writable overlayfs (lower=squashfs, upper=tmpfs)
          # - /var is a writable overlayfs
          # - /home is a writable overlayfs (or persistent partition)
          # - A small tmpfs provides upper layers
          # Implementation: overlayroot package + custom systemd unit
          # that enables the overlay at boot, matching SteamOS's approach.
          cat > config/hooks/live/0130-readonly-overlay.hook.chroot << 'OVERLAY_HOOK'
          #!/bin/bash
          set -e

          echo "=== Configuring SteamOS-style read-only FS overlay ==="

          # ── overlayroot configuration ──────────────────────────────────
          # The overlayroot package mounts an overlay over / on boot.
          # We configure it to use tmpfs as the upper layer so changes
          # are stored in RAM and discarded on reboot (immutable).
          cat > /etc/overlayroot.conf << 'OVERLAYCONF'
          # KibaOS: SteamOS-style read-only root filesystem
          # overlayroot=tmpfs: mounts tmpfs as the writable upper layer
          # recurse=0: only overlay /, not sub-mounts
          overlayroot="tmpfs:size=50%,swap=0,recurse=0"
          overlayroot_cfgdisk="disabled"
          OVERLAYCONF

          # ── Persistent /etc via overlayfs ──────────────────────────────
          # /etc needs to survive writes (network config, user passwords etc.)
          # We bind-mount a writable copy of /etc from /var/lib/kibaos/etc
          # on each boot, mirroring SteamOS's approach.
          mkdir -p /var/lib/kibaos/etc-overlay
          mkdir -p /var/lib/kibaos/etc-work

          cat > /etc/systemd/system/kibaos-etc-overlay.service << 'ETCOVERLAY'
          [Unit]
          Description=KibaOS writable /etc overlay
          DefaultDependencies=no
          Before=sysinit.target local-fs.target
          After=local-fs-pre.target

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/bin/mount -t overlay overlay \
            -o lowerdir=/etc,upperdir=/var/lib/kibaos/etc-overlay,workdir=/var/lib/kibaos/etc-work \
            /etc

          [Install]
          WantedBy=sysinit.target
          ETCOVERLAY

          # ── steamos-readonly toggle script ─────────────────────────────
          # Provides the same interface as SteamOS: enable/disable readonly FS
          cat > /usr/local/bin/kibaos-readonly << 'ROSWITCH'
          #!/bin/bash
          case "$1" in
            enable)
              echo "overlayroot=\"tmpfs:size=50%,swap=0,recurse=0\"" \
                > /etc/overlayroot.conf
              echo "Read-only mode enabled. Reboot to apply."
              ;;
            disable)
              echo "overlayroot=\"\"" > /etc/overlayroot.conf
              echo "Read-only mode disabled. Reboot to apply."
              ;;
            status)
              if grep -q "tmpfs" /etc/overlayroot.conf 2>/dev/null; then
                echo "Read-only mode: ENABLED"
              else
                echo "Read-only mode: DISABLED"
              fi
              ;;
            *)
              echo "Usage: kibaos-readonly {enable|disable|status}"
              exit 1
              ;;
          esac
          ROSWITCH
          chmod +x /usr/local/bin/kibaos-readonly

          # Enable the /etc overlay service
          systemctl enable kibaos-etc-overlay.service 2>/dev/null || true

          # ── Note on live session ────────────────────────────────────────
          # The live session itself already uses overlayfs (via live-boot).
          # The above config takes effect on the INSTALLED system.
          # live-boot sets up its own overlay automatically.

          echo "=== Read-only FS overlay configured ==="
          OVERLAY_HOOK
          chmod +x config/hooks/live/0130-readonly-overlay.hook.chroot

          echo "=== Building ISO ==="

          lb build 2>&1 | tee build.log

          if [ -f live-image-amd64.hybrid.iso ]; then
            mv live-image-amd64.hybrid.iso "${ISO}.iso"
            sha256sum "${ISO}.iso" > "${ISO}.iso.sha256"
            echo ""
            echo "═══ KibaOS Build Complete ═══"
            ls -lh "${ISO}.iso"
          else
            echo "ERROR: ISO file not found!"
            exit 1
          fi
          BUILD_SCRIPT_EOF

          chmod +x build.sh

      - name: Run build in Docker
        run: |
          docker run --rm --privileged \
            -v "$PWD:/w" \
            -e RUN_NUM="${{ github.run_number }}" \
            debian:trixie \
            /w/build.sh

      - name: Upload to SourceForge
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          SF_USER: ${{ secrets.SF_USER }}
          SF_PASS: ${{ secrets.SF_PASS }}
        run: |
          if [ -z "$SF_USER" ] || [ -z "$SF_PASS" ]; then
            echo "SourceForge credentials not configured. Skipping upload."
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y sshpass rsync

          for iso_file in *.iso; do
            [ -f "$iso_file" ] || continue
            echo "Uploading $iso_file to SourceForge..."
            for attempt in 1 2 3; do
              if sshpass -p "$SF_PASS" rsync -avP \
                -e "ssh -o StrictHostKeyChecking=no" \
                "$iso_file" \
                "$SF_USER@frs.sourceforge.net:/home/frs/project/kibaos/"; then
                echo "Successfully uploaded $iso_file"
                break
              else
                echo "Upload attempt $attempt failed, retrying in 30s..."
                sleep 30
              fi
            done
          done