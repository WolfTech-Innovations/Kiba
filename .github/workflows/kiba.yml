          # ─────────────────────────────────────────────────────────────────
          # ── O. Liquid Glass + ChromeOS-inspired aesthetic ─────────────────
          # No external icon packs or themes required.
          # Achieved entirely through KDE config: blur, transparency, contrast,
          # rounded corners, translucent panel, and a ChromeOS-style bottom bar.
          # "Liquid glass" = heavy blur + frosted transparency on all surfaces.
          # ChromeOS = minimal, clean, bottom shelf with app icons only.
          # ─────────────────────────────────────────────────────────────────

          # O-1. KWin: Maximum blur + high contrast effect ("frosted glass")
          cat > "$SKEL_KDE/kwinrc" << 'KWINRC'
          [Compositing]
          Enabled=true
          Backend=OpenGL
          GLCore=true
          HiddenPreviews=5
          OpenGLIsUnsafe=false
          AnimationSpeed=3

          [Effect-overview]
          BorderActivate=7

          [Plugins]
          # Blur is the core of the liquid glass look
          blurEnabled=true
          # Contrast sharpens the frosted appearance
          contrastEnabled=true
          kwin4_effect_dimscreenEnabled=false
          slideEnabled=true
          wobblywindowsEnabled=false
          # Window thumbnails (ChromeOS overview-like)
          presentwindowsEnabled=true

          [Effect-blur]
          BlurStrength=12
          NoiseStrength=2

          [Windows]
          RoundedCorners=true

          [org.kde.kdecoration2]
          ButtonsOnLeft=
          ButtonsOnRight=IAX
          library=org.kde.breeze
          BorderSize=None
          BorderSizeAuto=false

          [Script-roundedwindows]
          # 16px radius = macOS-style soft corners
          CornerRadius=16
          KWINRC

          # O-2. Plasma panel: translucent floating ChromeOS-style bottom shelf
          # Floating panel with transparency looks like ChromeOS shelf or macOS dock.
          cat > "$SKEL_KDE/plasmashellrc" << 'PLASMASHELLRC'
          [PlasmaViews][Panel 2][Defaults]
          thickness=52

          [PlasmaViews][Panel 2][Horizontal1920]
          thickness=52

          [PlasmaViews][Panel 2][floating]
          floating=1

          [PlasmaViews][Panel 2][opacity]
          type=2
          PLASMASHELLRC

          # O-3. Breeze decoration: stronger glass-like shadow
          cat > "$SKEL_KDE/breezerc" << 'BREEZERC'
          [Common]
          ShadowColor=40,42,54
          ShadowSize=ShadowVeryLarge
          ShadowStrength=128
          BackgroundOpacity=85

          [Windeco Exception 0]
          BorderSize=None
          Enabled=true
          ExceptionPattern=.*
          ExceptionType=0
          HideTitleBar=false
          Mask=2
          BREEZERC

          # O-4. KDE global: enable translucency on plasma theme
          #      We override the colour scheme to add alpha transparency where
          #      KDE supports it — primarily through the plasma style config.
          cat > "$SKEL_KDE/plasmarc" << 'PLASMARC'
          [Theme]
          name=breeze-dark

          [PlasmaTabletMode]
          TabletMode=off

          [KScreen]
          ScaleFactor=1
          PLASMARC

          # O-5. KDE theme: write a colours override that uses lower alpha backgrounds
          #      KDE 6 respects *Background*Alpha keys in the color scheme.
          #      This gives everything a translucent tinted glass look.
          mkdir -p /usr/share/color-schemes
          cat > /usr/share/color-schemes/KibaOSGlass.colors << 'GLASS_COLORS'
          [ColorEffects:Disabled]
          ChangeSelectionColor=true
          Color=56,56,56
          ColorAmount=0
          ColorEffect=0
          ContrastAmount=0.65
          ContrastEffect=1
          IntensityAmount=0.1
          IntensityEffect=2

          [ColorEffects:Inactive]
          Enable=false

          [Colors:Button]
          BackgroundAlternate=68,71,90,180
          BackgroundNormal=68,71,90,180
          DecorationFocus=189,147,249
          DecorationHover=189,147,249
          ForegroundNormal=248,248,242
          ForegroundInactive=98,114,164
          ForegroundActive=189,147,249
          ForegroundLink=139,233,253
          ForegroundNegative=255,85,85
          ForegroundNeutral=241,250,140
          ForegroundPositive=80,250,123
          ForegroundVisited=255,121,198

          [Colors:Selection]
          BackgroundNormal=189,147,249,200
          BackgroundAlternate=68,71,90,200
          ForegroundNormal=40,42,54
          ForegroundInactive=98,114,164
          ForegroundActive=248,248,242

          [Colors:View]
          BackgroundNormal=40,42,54,160
          BackgroundAlternate=40,42,54,160
          ForegroundNormal=248,248,242
          ForegroundInactive=98,114,164
          ForegroundActive=189,147,249
          ForegroundLink=139,233,253
          ForegroundNegative=255,85,85
          ForegroundNeutral=241,250,140
          ForegroundPositive=80,250,123
          ForegroundVisited=255,121,198
          DecorationFocus=189,147,249
          DecorationHover=189,147,249

          [Colors:Window]
          BackgroundNormal=40,42,54,200
          BackgroundAlternate=68,71,90,200
          ForegroundNormal=248,248,242
          ForegroundInactive=98,114,164
          ForegroundActive=189,147,249
          ForegroundLink=139,233,253
          ForegroundNegative=255,85,85
          ForegroundNeutral=241,250,140
          ForegroundPositive=80,250,123
          ForegroundVisited=255,121,198
          DecorationFocus=189,147,249
          DecorationHover=189,147,249

          [Colors:Tooltip]
          BackgroundNormal=40,42,54,200
          BackgroundAlternate=68,71,90,200
          ForegroundNormal=248,248,242

          [Colors:Complementary]
          BackgroundNormal=40,42,54,200
          BackgroundAlternate=40,42,54,200
          ForegroundNormal=248,248,242

          [Colors:Header]
          BackgroundNormal=40,42,54,200
          BackgroundAlternate=40,42,54,200
          ForegroundNormal=248,248,242

          [General]
          ColorScheme=KibaOSGlass
          Name=KibaOS Glass
          shadeSortColumn=true

          [KDE]
          contrast=7
          GLASS_COLORS

          # Point kdeglobals at the glass colour scheme
          sed -i 's/^ColorScheme=.*/ColorScheme=KibaOSGlass/' "$SKEL_KDE/kdeglobals"

          # O-6. ChromeOS-style: taskbar uses Icon-only tasks (no labels),
          #      floating panel, large icons. Already configured in appletsrc above —
          #      the icontasks applet handles this. Add a chromeos-feel app grid:
          mkdir -p "$SKEL_KDE"
          cat >> "$SKEL_KDE/krunnerrc" << 'KRUNNERRC'
          [General]
          # Fast launcher on Meta key (ChromeOS launcher-style)
          activateWhenTypingOnDesktop=true
          KRUNNERRC

          # O-7. KDE 6 desktop: single-click to open (ChromeOS behaviour)
          sed -i 's/SingleClick=.*/SingleClick=true/' "$SKEL_KDE/kdeglobals" 2>/dev/null || true

          # O-8. Font smoothing: subpixel antialiasing (liquid glass needs smooth fonts)
          cat > "$SKEL_KDE/kdeglobals_fonts" << 'FONTCONF'
          [General]
          font=Noto Sans,10,-1,5,50,0,0,0,0,0
          menuFont=Noto Sans,10,-1,5,50,0,0,0,0,0
          smallestReadableFont=Noto Sans,8,-1,5,50,0,0,0,0,0
          toolBarFont=Noto Sans,10,-1,5,50,0,0,0,0,0
          fixed=Noto Mono,11,-1,5,50,0,0,0,0,0
          FONTCONF

          # Add Noto fonts to package list is handled in package list above;
          # here we just configure the font settings in skel.
          mkdir -p /etc/fonts/conf.d
          cat > /etc/fonts/local.conf << 'FONTSCONF'
          <?xml version="1.0"?>
          <!DOCTYPE fontconfig SYSTEM "fonts.dtd">
          <fontconfig>
            <match target="font">
              <edit name="antialias" mode="assign"><bool>true</bool></edit>
              <edit name="hinting" mode="assign"><bool>true</bool></edit>
              <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
              <edit name="rgba" mode="assign"><const>rgb</const></edit>
              <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
            </match>
          </fontconfig>
          FONTSCONF

          # ─────────────────────────────────────────────────────────────────
          # ── P. Calamares age verification module (California AADC) ────────
          # California Age-Appropriate Design Code (AB 2273) requires apps
          # to verify user age before data collection. We implement this as
          # a custom Calamares Python view module that runs during installation.
          # The module shows a simple age gate page and writes the result to
          # /etc/kibaos/user-age-verified which post-install can check.
          # ─────────────────────────────────────────────────────────────────

          mkdir -p /usr/lib/calamares/modules/ageverify
          cat > /usr/lib/calamares/modules/ageverify/module.desc << 'AGEDESC'
          ---
          type: "view"
          name: "ageverify"
          interface: "python"
          script: "main.py"
          AGEDESC

          cat > /usr/lib/calamares/modules/ageverify/main.py << 'AGEPYEOF'
          #!/usr/bin/env python3
          # -*- coding: utf-8 -*-
          # KibaOS Age Verification — California AADC (AB 2273) compliance
          # Shown as a Calamares installer page before users complete setup.
          # Written as a Calamares Python view module using PythonQt / PyQt6.

          import calamares
          from PyQt6.QtWidgets import (
              QWidget, QVBoxLayout, QHBoxLayout, QLabel,
              QPushButton, QButtonGroup, QRadioButton,
              QFrame, QSizePolicy, QSpacerItem
          )
          from PyQt6.QtCore import Qt
          from PyQt6.QtGui import QFont, QColor, QPalette
          import os

          class AgeVerifyPage(QWidget):
              def __init__(self):
                  super().__init__()
                  self._age_group = None
                  self._selection  = None
                  self._build_ui()

              def _build_ui(self):
                  layout = QVBoxLayout(self)
                  layout.setContentsMargins(48, 32, 48, 32)
                  layout.setSpacing(16)

                  # ── Header ─────────────────────────────────────────────
                  title = QLabel("Age Verification")
                  f = title.font()
                  f.setPointSize(20)
                  f.setBold(True)
                  title.setFont(f)
                  layout.addWidget(title)

                  sub = QLabel(
                      "California law (AB 2273 — Age-Appropriate Design Code) requires "
                      "us to verify your age group before completing installation. "
                      "This information is stored locally on your device only and is "
                      "never transmitted."
                  )
                  sub.setWordWrap(True)
                  sub.setStyleSheet("color: #6272a4; font-size: 13px;")
                  layout.addWidget(sub)

                  sep = QFrame()
                  sep.setFrameShape(QFrame.Shape.HLine)
                  sep.setStyleSheet("color: #44475a;")
                  layout.addWidget(sep)

                  prompt = QLabel("Please select your age group:")
                  pf = prompt.font()
                  pf.setPointSize(13)
                  prompt.setFont(pf)
                  layout.addWidget(prompt)

                  # ── Age radio buttons ───────────────────────────────────
                  self._age_group = QButtonGroup(self)
                  age_choices = [
                      ("under13",   "Under 13  (Children — enhanced privacy protections apply)"),
                      ("13to15",    "13 – 15   (Teen — some content restrictions apply)"),
                      ("16to17",    "16 – 17   (Minor — standard minor protections)"),
                      ("18plus",    "18 or older  (Adult — full access)"),
                      ("decline",   "Prefer not to say"),
                  ]
                  for value, label in age_choices:
                      rb = QRadioButton(label)
                      rb.setProperty("ageValue", value)
                      rb.setStyleSheet("font-size: 13px; padding: 6px 0;")
                      self._age_group.addButton(rb)
                      layout.addWidget(rb)

                  self._age_group.buttonClicked.connect(self._on_age_selected)

                  layout.addItem(QSpacerItem(20, 20,
                      QSizePolicy.Policy.Minimum, QSizePolicy.Policy.Expanding))

                  # ── Privacy note ────────────────────────────────────────
                  note = QLabel(
                      "🔒  Your selection is saved to /etc/kibaos/age-verify on this device "
                      "only. KibaOS does not collect or transmit personal data."
                  )
                  note.setWordWrap(True)
                  note.setStyleSheet(
                      "background: rgba(68,71,90,120); border-radius: 8px; "
                      "padding: 10px; color: #f8f8f2; font-size: 12px;"
                  )
                  layout.addWidget(note)

              def _on_age_selected(self, btn):
                  self._selection = btn.property("ageValue")

              def isComplete(self):
                  # Page is complete when user has made a selection
                  return self._selection is not None

              def getSelection(self):
                  return self._selection


          _page = None

          def viewStep():
              return _page

          def create():
              global _page
              _page = AgeVerifyPage()
              return _page

          def onLeave():
              """Called when the user clicks Next. Write their choice to disk."""
              global _page
              if _page is None:
                  return
              selection = _page.getSelection() or "not-answered"
              try:
                  target = calamares.globalstorage.value("rootMountPoint") or ""
                  dest = os.path.join(target, "etc", "kibaos")
                  os.makedirs(dest, exist_ok=True)
                  with open(os.path.join(dest, "age-verify"), "w") as f:
                      f.write(f"age_group={selection}\n")
                      f.write("# KibaOS age verification — California AB 2273\n")
                      f.write("# Stored locally only, never transmitted.\n")
              except Exception as e:
                  calamares.utils.debug(f"ageverify: could not write result: {e}")

          def prettyName():
              return "Age Verification"

          def isNextEnabled():
              return True   # Allow skip (user may not wish to answer)

          def onActivate():
              pass

          def retranslate():
              pass
          AGEPYEOF

          chmod +x /usr/lib/calamares/modules/ageverify/main.py

          # Add ageverify to the Calamares settings.conf show sequence
          # (it's a view module — it goes in the "show" list, not "exec")
          if [ -f /etc/calamares/settings.conf ]; then
            # Insert after "users" in the show sequence
            if ! grep -q "ageverify" /etc/calamares/settings.conf; then
              sed -i '/^\s*- users$/a\              - ageverify' \
                /etc/calamares/settings.conf
            fi
          fi
          cp -rn /etc/skel/. /home/user/ 2>/dev/null || true
          chown -R user:user /home/user/.config /home/user/.local 2>/dev/null || true

          # ── L. Services ───────────────────────────────────────────────────

          systemctl enable sddm          || true
          systemctl enable NetworkManager || true
          systemctl enable plymouth      || true

          # ── M. System identity ────────────────────────────────────────────

          echo "kibaos-live" > /etc/hostname

          cat > /etc/os-release << 'EOF'
          NAME="KibaOS"
          ID=kibaos
          ID_LIKE=debian
          VERSION_ID="1.0"
          PRETTY_NAME="KibaOS 1.0"
          HOME_URL="https://github.com/WolfTech-Innovations/kiba"
          SUPPORT_URL="https://github.com/WolfTech-Innovations/kiba/issues"
          BUG_REPORT_URL="https://github.com/WolfTech-Innovations/kiba/issues"
          EOF

          cat > /etc/issue << 'EOF'
          KibaOS \r (\l)

          EOF

          cat > /etc/motd << 'EOF'

           _  ___ _             ___  ____
          | |/ (_) |__   __ _ / _ \/ ___|
          | ' /| | '_ \ / _` | | | \___ \
          | . \| | |_) | (_| | |_| |___) |
          |_|\_\_|_.__/ \__,_|\___/|____/

          Welcome to KibaOS — built on Debian 13 Trixie

          EOF

          # ── N. Rename Discover → KibaStore ───────────────────────────────
          # Override the Discover .desktop file to rename it "KibaStore".
          # We do this by placing a higher-priority .desktop file override
          # in /usr/local/share/applications/ (takes precedence over
          # /usr/share/applications/ per XDG spec).
          mkdir -p /usr/local/share/applications
          DISCOVER_SRC=""
          for f in /usr/share/applications/org.kde.discover.desktop \
                   /usr/share/applications/plasma-discover.desktop \
                   /usr/share/applications/discover.desktop; do
            [ -f "$f" ] && DISCOVER_SRC="$f" && break
          done

          if [ -n "$DISCOVER_SRC" ]; then
            DISCOVER_BASENAME=$(basename "$DISCOVER_SRC")
            cp "$DISCOVER_SRC" "/usr/local/share/applications/$DISCOVER_BASENAME"
            # Replace all Name= lines with KibaStore
            sed -i 's/^Name=.*/Name=KibaStore/' \
              "/usr/local/share/applications/$DISCOVER_BASENAME"
            sed -i 's/^Name\[.*\]=.*//' \
              "/usr/local/share/applications/$DISCOVER_BASENAME"
            # Update desktop-file database
            update-desktop-database /usr/local/share/applications 2>/dev/null || true
          fi

          # Also patch the appdata / appstream entry if it exists
          for f in /usr/share/metainfo/org.kde.discover.appdata.xml \
                   /usr/share/appdata/org.kde.discover.appdata.xml; do
            if [ -f "$f" ]; then
              # Create override in /usr/local/share/metainfo
              mkdir -p /usr/local/share/metainfo
              cp "$f" "/usr/local/share/metainfo/$(basename $f)"
              sed -i 's|<name>Discover</name>|<name>KibaStore</name>|g' \
                "/usr/local/share/metainfo/$(basename $f)"
            fi
          done

          # Add Flathub as default Flatpak remote in skel
          mkdir -p /etc/skel/.local/share/flatpak/remotes
          cat > /etc/skel/.local/share/flatpak/remotes/flathub.flatpakrepo << 'FLATHUBREPO'
          [Flatpak Repo]
          Title=Flathub
          Url=https://dl.flathub.org/repo/
          Homepage=https://flathub.org
          Comment=Central repository of Flatpak applications
          Description=Central repository of Flatpak applications
          Icon=https://dl.flathub.org/repo/logo.svg
          GPGKey=mQINBFlD2sABEADsiUZUO...
          FLATHUBREPO
          # Also add Flathub system-wide via hook (requires internet at runtime)
          cat > /etc/profile.d/flatpak-flathub.sh << 'FPHUB'
          # Add Flathub remote for Flatpak on first boot if not already added
          if flatpak remote-list 2>/dev/null | grep -q flathub; then
            true
          else
            flatpak remote-add --if-not-exists flathub \
              https://flathub.org/repo/flathub.flatpakrepo 2>/dev/null || true
          fi
          FPHUB
          chmod +x /etc/profile.d/flatpak-flathub.sh

          HOOK

          chmod +x config/hooks/live/0100-customize.hook.chroot

          echo "=== Creating Calamares config ==="

          mkdir -p config/includes.chroot/etc/calamares/branding/kibaos
          cat > config/includes.chroot/etc/calamares/branding/kibaos/branding.desc << 'BRANDING'
          componentName: kibaos

          # Welcome page style — valid values: "calamares" or "distro"
          welcomeStyleCalamares: true
          welcomeExpandingLogo: true

          # Slideshow API version (2 = async load, requires onActivate/onLeave in QML)
          slideshowAPI: 2

          strings:
            productName: "KibaOS"
            shortProductName: "KibaOS"
            version: "1.0"
            shortVersion: "1.0"
            versionedName: "KibaOS 1.0"
            shortVersionedName: "KibaOS 1.0"
            bootloaderEntryName: "KibaOS"
            productUrl: "https://github.com/WolfTech-Innovations/kiba"
            supportUrl: "https://github.com/WolfTech-Innovations/kiba/issues"
            knownIssuesUrl: "https://github.com/WolfTech-Innovations/kiba/issues"
            releaseNotesUrl: "https://github.com/WolfTech-Innovations/kiba"

          images:
            productLogo: "logo.png"
            productIcon: "logo.png"
            productWelcome: "welcome.png"

          # Sidebar colors — exactly 4 required sub-keys, no others
          style:
            SidebarBackground:        "#282a36"
            SidebarText:              "#f8f8f2"
            SidebarTextCurrent:       "#282a36"
            SidebarBackgroundCurrent: "#bd93f9"

          slideshow: "show.qml"
          BRANDING

          mkdir -p config/hooks/live
          cat > config/hooks/live/0110-calamares-branding.hook.chroot << 'BRANDING_HOOK'
          #!/bin/bash
          set -e
          mkdir -p /etc/calamares/branding/kibaos
          cp /usr/share/kibaos/logo.png /etc/calamares/branding/kibaos/logo.png
          cp /usr/share/kibaos/logo.png /etc/calamares/branding/kibaos/welcome.png

          # Point Calamares at our branding
          if [ -f /etc/calamares/settings.conf ]; then
            sed -i 's/branding: .*/branding: kibaos/' /etc/calamares/settings.conf

            # Ensure shellprocess@post is in the exec sequence BEFORE umount.
            # calamares-settings-debian uses 2-space indentation.
            # We must also ensure an instances: block exists for shellprocess@post.
            if ! grep -q "shellprocess@post" /etc/calamares/settings.conf; then
              # Inject before umount if present, else before finished
              if grep -q "^\s*- umount" /etc/calamares/settings.conf; then
                sed -i '/^\s*- umount/i\      - shellprocess@post' \
                  /etc/calamares/settings.conf
              elif grep -q "^\s*- finished" /etc/calamares/settings.conf; then
                sed -i '/^\s*- finished/i\      - shellprocess@post' \
                  /etc/calamares/settings.conf
              fi
            fi

            # Inject preservefiles before umount (copies install log to target)
            if ! grep -q "preservefiles" /etc/calamares/settings.conf; then
              if grep -q "^\s*- umount" /etc/calamares/settings.conf; then
                sed -i '/^\s*- umount/i\      - preservefiles' \
                  /etc/calamares/settings.conf
              fi
            fi

            # Add instances block if missing (required for @-suffixed modules)
            if ! grep -q "^instances:" /etc/calamares/settings.conf; then
              # Prepend instances block at the top of the file after ---
              sed -i '/^---/a\\ninstances:\n  - id: post\n    module: shellprocess\n    config: shellprocess@post.conf\n' \
                /etc/calamares/settings.conf
            fi

          else
            # Write a complete, correct settings.conf for Debian/KibaOS
            cat > /etc/calamares/settings.conf << 'CALASETTINGS'
          ---
          modules-search: [ local, /usr/lib/calamares/modules ]

          # Named instances — allows multiple shellprocess runs with different configs
          instances:
            - id: post
              module: shellprocess
              config: shellprocess@post.conf

          sequence:
            - show:
              - welcome
              - locale
              - keyboard
              - partition
              - users
              - summary
            - exec:
              - partition
              - mount
              - unpackfs
              - machineid
              - fstab
              - locale
              - keyboard
              - localecfg
              - users
              - displaymanager
              - networkcfg
              - hwclock
              - services-systemd
              - initramfs
              - grubcfg
              - bootloader
              - shellprocess@post
              - preservefiles
              - umount
            - show:
              - finished

          branding: kibaos
          prompt-install: false
          dont-chroot: false
          oem-setup: false
          disable-cancel: false
          disable-cancel-during-exec: false
          hide-back-and-next-during-exec: true
          quit-at-end: false
          CALASETTINGS
          fi

          # ── displaymanager.conf: tell Calamares to configure SDDM ────────────
          mkdir -p /etc/calamares/modules
          cat > /etc/calamares/modules/displaymanager.conf << 'DMCONF'
          ---
          # Display manager to configure in the installed system
          displaymanagers:
            - sddm
          basicSetup: false
          DMCONF

          # ── preservefiles.conf: copy Calamares log to installed system ───────
          cat > /etc/calamares/modules/preservefiles.conf << 'PRESFILES'
          ---
          # Copy the Calamares install log into the target for debugging
          dontChroot: true
          files:
            - from: log
              dest: /var/log/kibaos-install.log
              perm: root:root:644
          PRESFILES

          # ── Calamares show.qml slideshow ──────────────────────────────────
          # Slides say "KibaOS | Switch to simple" per spec
          cat > /etc/calamares/branding/kibaos/show.qml << 'SHOWQML'
          import calamares.slideshow 1.0;

          Presentation {
              id: presentation

              Timer {
                  interval: 5000
                  running: presentation.activatedInCalamares
                  repeat: true
                  onTriggered: presentation.goToNextSlide()
              }

              Slide {
                  centeredText: "KibaOS | Switch to simple\n\nFast, beautiful, built on Debian 13 Trixie."
              }

              Slide {
                  centeredText: "KibaOS | Switch to simple\n\nKDE Plasma 6 — a powerful desktop crafted for you."
              }

              Slide {
                  centeredText: "KibaOS | Switch to simple\n\nInstallation in progress… won't take long!"
              }

              function onActivate() { presentation.currentSlide = 0; }
              function onLeave() {}
          }
          SHOWQML

          # ── Calamares .desktop launcher on desktop ────────────────────────
          mkdir -p /usr/share/applications
          cat > /usr/share/applications/calamares.desktop << 'CALADESKTOP'
          [Desktop Entry]
          Type=Application
          Version=1.0
          Name=Install KibaOS
          Comment=Install KibaOS to your system
          Exec=sudo calamares
          Icon=calamares
          Terminal=false
          Categories=System;
          CALADESKTOP

          # ── Apply post-install hook: copy settings to installed system ─────
          mkdir -p /etc/calamares/modules
          # shellprocess is the correct Calamares module for running scripts
          # after installation. The key is "script" with a list of commands.
          cat > /etc/calamares/modules/shellprocess@post.conf << 'POSTINSTALL'
          ---
          # KibaOS post-install: runs inside the TARGET (installed) system.
          # dontChroot: false  → script runs chrooted into the installed root.
          # script: takes a plain list of shell command strings.
          dontChroot: false
          timeout: 300
          verbose: true
          script:
            - "/usr/share/kibaos/post-install.sh"
          POSTINSTALL

          mkdir -p /usr/share/kibaos
          cat > /usr/share/kibaos/post-install.sh << 'POSTINSTALLSH'
          #!/bin/bash
          # ══════════════════════════════════════════════════════════════════════
          # KibaOS post-install — runs CHROOTED inside the installed system
          # via Calamares shellprocess@post (dontChroot: false).
          #
          # Everything written by the live-build chroot hook lives in the squashfs
          # and is already present here at runtime. This script:
          #   1. Copies /etc/skel → new user home
          #   2. Stamps every system config file to match the live environment
          #   3. Removes live-only files (autologin, NOPASSWD sudoers)
          #   4. Disables live-only services / re-enables installed-system ones
          #   5. Rebuilds initramfs + GRUB so Plymouth and kernel settings stick
          # ══════════════════════════════════════════════════════════════════════
          set -e
          exec > /var/log/kibaos-post-install.log 2>&1

          # ── Resolve installed user (UID 1000, created by Calamares users module)
          TARGET_USER=$(getent passwd 1000 | cut -d: -f1 || true)
          [ -z "$TARGET_USER" ] && TARGET_USER=$(ls /home 2>/dev/null | head -1 || true)
          [ -z "$TARGET_USER" ] && { echo "FATAL: no target user found at UID 1000"; exit 1; }
          TARGET_HOME="/home/$TARGET_USER"
          echo "=== KibaOS post-install: user=$TARGET_USER home=$TARGET_HOME ==="

          # ══════════════════════════════════════════════════════════════════════
          # 1. SKEL → USER HOME
          #    All KDE config files, Konsole profile, Flatpak stub, power profile
          #    are in /etc/skel — copy the whole tree to the new user's home.
          # ══════════════════════════════════════════════════════════════════════
          mkdir -p "$TARGET_HOME"
          cp -rn /etc/skel/. "$TARGET_HOME/" 2>/dev/null || true
          chown -R "$TARGET_USER:$TARGET_USER" "$TARGET_HOME"

          # ══════════════════════════════════════════════════════════════════════
          # 2. ZSH — set as default shell for installed user
          # ══════════════════════════════════════════════════════════════════════
          if [ -x /bin/zsh ]; then
            chsh -s /bin/zsh "$TARGET_USER" 2>/dev/null || true
            chsh -s /bin/zsh root           2>/dev/null || true
          fi

          # /etc/zsh/zshrc — already in squashfs; stamp it fresh to be sure
          mkdir -p /etc/zsh
          cat > /etc/zsh/zshrc << 'ZSHRC'
          # KibaOS system-wide zshrc
          export LANG=en_US.UTF-8
          export EDITOR=nano

          HISTSIZE=10000
          SAVEHIST=10000
          HISTFILE=~/.zsh_history
          setopt SHARE_HISTORY
          setopt HIST_IGNORE_DUPS

          autoload -Uz compinit && compinit
          zstyle ':completion:*' menu select

          autoload -Uz vcs_info
          precmd() { vcs_info }
          PROMPT='%F{#bd93f9}%n@%m%f %F{#f8f8f2}%~%f %F{#bd93f9}❯%f '

          source /usr/share/zsh-autosuggestions/zsh-autosuggestions.zsh 2>/dev/null || true
          source /usr/share/zsh-syntax-highlighting/zsh-syntax-highlighting.zsh 2>/dev/null || true

          alias ls='ls --color=auto'
          alias ll='ls -lah'
          alias update='sudo apt update && sudo apt upgrade -y'
          alias install='sudo apt install'
          ZSHRC

          # ══════════════════════════════════════════════════════════════════════
          # 3. SDDM — remove live autologin, write clean installed-system config
          # ══════════════════════════════════════════════════════════════════════
          mkdir -p /etc/sddm.conf.d
          rm -f /etc/sddm.conf.d/autologin.conf
          cat > /etc/sddm.conf.d/kde.conf << 'SDDMCONF'
          [General]
          DisplayServer=x11
          GreeterEnvironment=QT_SCREEN_SCALE_FACTORS=1,QT_FONT_DPI=96

          [Theme]
          Current=breeze

          [Users]
          DefaultPath=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          RememberLastSession=true
          RememberLastUser=true
          SDDMCONF

          # ══════════════════════════════════════════════════════════════════════
          # 4. SUDOERS — remove live NOPASSWD rule
          # ══════════════════════════════════════════════════════════════════════
          rm -f /etc/sudoers.d/live-user

          # ══════════════════════════════════════════════════════════════════════
          # 5. SYSTEM IDENTITY
          # ══════════════════════════════════════════════════════════════════════
          echo "kibaos" > /etc/hostname

          cat > /etc/hosts << 'HOSTS'
