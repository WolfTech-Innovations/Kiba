name: "KibaOS Build"

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker system prune -af --volumes

      - name: Create build script
        run: |
          cat > build.sh << 'BUILD_SCRIPT_EOF'
          #!/bin/bash
          set -ex
          export DEBIAN_FRONTEND=noninteractive

          # Install live-build
          apt-get update && apt-get install -y \
            live-build debootstrap xorriso git squashfs-tools

          cd /w
          ISO="kibaos-v${RUN_NUM}"

          echo "=== Configuring live-build ==="

          lb config \
            --distribution trixie \
            --architectures amd64 \
            --archive-areas "main contrib non-free non-free-firmware" \
            --debian-installer live \
            --debian-installer-gui false \
            --binary-images iso-hybrid \
            --mode debian \
            --system live \
            --linux-flavours amd64 \
            --linux-packages "linux-image linux-headers" \
            --bootappend-live "boot=live components quiet splash" \
            --bootappend-install "auto=true priority=critical" \
            --iso-application "KibaOS" \
            --iso-volume "KIBAOS" \
            --apt-options "--yes --no-install-recommends" \
            --compression xz

          # ── Max squashfs compression: XZ with 1M block + 100% dict ──────────
          # live-build exposes compression settings via lb config --compression
          # We override the squashfs hook directly for maximum compression:
          # -comp xz -b 1048576 -Xdict-size 100%
          mkdir -p config/hooks/binary
          cat > config/hooks/binary/0010-squashfs-compression.hook.binary << 'SQFS_HOOK'
          #!/bin/bash
          # Repack the squashfs with maximum XZ compression
          # (1 MiB blocks, 100% dictionary size)
          set -e
          SQFS=$(find binary/live -name "*.squashfs" 2>/dev/null | head -1)
          [ -z "$SQFS" ] && exit 0
          TMPDIR=$(mktemp -d)
          unsquashfs -d "$TMPDIR/root" "$SQFS"
          rm "$SQFS"
          mksquashfs "$TMPDIR/root" "$SQFS" \
            -comp xz \
            -b 1048576 \
            -Xdict-size 100% \
            -no-progress \
            -noappend
          rm -rf "$TMPDIR"
          echo "=== SquashFS repacked with maximum XZ compression ==="
          SQFS_HOOK
          chmod +x config/hooks/binary/0010-squashfs-compression.hook.binary

          echo "=== Adding packages ==="

          mkdir -p config/package-lists
          cat > config/package-lists/kde.list.chroot << 'PACKAGES'
          # Base system
          linux-image-amd64
          firmware-linux-free
          firmware-linux-nonfree
          systemd-sysv
          sudo
          ca-certificates
          openssl

          # Network
          network-manager
          wpasupplicant
          wget
          curl
          git
          apt-transport-https

          # KDE Plasma 6 (Debian 13 trixie)
          kde-plasma-desktop
          plasma-desktop
          plasma-workspace
          sddm
          sddm-theme-debian-breeze
          kde-standard
          plasma-nm
          plasma-pa
          plasma-firewall
          dolphin
          konsole
          kate
          ark
          okular
          gwenview
          kde-spectacle
          kcalc
          qt6-svg-plugins
          desktop-file-utils
          plasma-widgets-addons
          kdeplasma-addons
          breeze
          plasma-workspace-wallpapers

          # Flatpak support
          flatpak
          plasma-discover
          plasma-discover-backend-flatpak
          xdg-desktop-portal-kde

          # Shell - zsh
          zsh
          zsh-autosuggestions
          zsh-syntax-highlighting

          # Boot splash
          plymouth
          plymouth-themes
          kde-config-plymouth

          # Essential apps
          firefox-esr
          vlc
          calamares
          calamares-settings-debian

          # Essential tools
          nano
          gparted
          htop
          python3
          python3-pip
          python3-numpy
          python3-cffi

          # Filesystems
          ntfs-3g
          exfatprogs

          # Boot loader
          grub-efi-amd64
          grub-pc-bin

          # Squashfs tools (needed in chroot for overlay script)
          squashfs-tools

          # OverlayFS / read-only FS support (systemd-based)
          overlayroot
          PACKAGES

          echo "=== Creating live customization hook ==="

          mkdir -p config/hooks/live
          cat > config/hooks/live/0100-customize.hook.chroot << 'HOOK'
          #!/bin/bash
          set -e

          # ── Plymouth theme setup ──────────────────────────────────────────

          mkdir -p /usr/share/kibaos
          mkdir -p /usr/share/plymouth/themes/kibaos-spinner

          # Embed boot logo as base64 and decode it directly — no network needed
          cat > /tmp/logo_b64.txt << 'LOGO_B64'
          
          LOGO_B64

          base64 -d /tmp/logo_b64.txt > /usr/share/kibaos/logo.png
          rm /tmp/logo_b64.txt

          # Plymouth theme config — Dracula indigo background (#282a36)
          cat > /usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.plymouth << 'PLYMOUTH_THEME'
          [Plymouth Theme]
          Name=KibaOS Spinner
          Description=KibaOS boot splash
          ModuleName=script

          [script]
          ImageDir=/usr/share/plymouth/themes/kibaos-spinner
          ScriptFile=/usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.script
          PLYMOUTH_THEME

          # Midnight indigo = Dracula #282a36 = (0.157, 0.165, 0.212)
          cat > /usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.script << 'PLYMOUTH_SCRIPT'
          Window.SetBackgroundTopColor(0.157, 0.165, 0.212);
          Window.SetBackgroundBottomColor(0.157, 0.165, 0.212);

          logo.image = Image("watermark.png");
          logo.sprite = Sprite(logo.image);
          logo.x = Window.GetX() + Window.GetWidth()  / 2 - logo.image.GetWidth()  / 2;
          logo.y = Window.GetY() + Window.GetHeight() / 2 - logo.image.GetHeight() / 2 - 80;
          logo.sprite.SetPosition(logo.x, logo.y, 0);

          for (i = 0; i < 32; i++) {
              spinner_image[i] = Image("spinner-" + i + ".png");
          }
          spinner.sprite = Sprite();
          spinner.frame = 0;
          spinner.x = Window.GetX() + Window.GetWidth()  / 2 - spinner_image[0].GetWidth()  / 2;
          spinner.y = logo.y + logo.image.GetHeight() + 40;
          spinner.sprite.SetPosition(spinner.x, spinner.y, 1);

          fun progress_callback(duration, progress) {
              spinner.frame = Math.Int(progress * 32) % 32;
              spinner.sprite.SetImage(spinner_image[spinner.frame]);
          }
          Plymouth.SetRefreshFunction(progress_callback);

          message_sprite = Sprite();
          message_sprite.SetPosition(10, 10, 10000);
          fun message_callback(text) {
              message_image = Image.Text(text, 1, 1, 1);
              message_sprite.SetImage(message_image);
          }
          Plymouth.SetMessageFunction(message_callback);
          PLYMOUTH_SCRIPT

          cp /usr/share/kibaos/logo.png \
             /usr/share/plymouth/themes/kibaos-spinner/watermark.png

          # Borrow spinner frames from the default spinner theme if available
          if [ -d /usr/share/plymouth/themes/spinner ]; then
              cp /usr/share/plymouth/themes/spinner/spinner-*.png \
                 /usr/share/plymouth/themes/kibaos-spinner/ 2>/dev/null || true
          fi

          update-alternatives --install \
            /usr/share/plymouth/themes/default.plymouth default.plymouth \
            /usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.plymouth 100
          update-alternatives --set default.plymouth \
            /usr/share/plymouth/themes/kibaos-spinner/kibaos-spinner.plymouth

          # Rebuild initramfs so plymouth theme actually loads on boot
          update-initramfs -u -k all || update-initramfs -u

          # ── GRUB branding ─────────────────────────────────────────────────

          cat >> /etc/default/grub << 'GRUB_CONFIG'

          # KibaOS GRUB Branding
          GRUB_DISTRIBUTOR="KibaOS"
          GRUB_TIMEOUT=5
          GRUB_CMDLINE_LINUX_DEFAULT="quiet splash"
          GRUB_CMDLINE_LINUX=""
          GRUB_GFXMODE=1920x1080,1280x720,auto
          GRUB_COLOR_NORMAL="white/black"
          GRUB_COLOR_HIGHLIGHT="black/white"
          GRUB_CONFIG

          # ── SDDM autologin for live session ───────────────────────────────

          mkdir -p /etc/sddm.conf.d
          cat > /etc/sddm.conf.d/autologin.conf << 'SDDM_CONF'
          [Autologin]
          User=user
          Session=plasma
          SDDM_CONF

          # ── Default shell: zsh ────────────────────────────────────────────

          chsh -s /bin/zsh user  2>/dev/null || true
          chsh -s /bin/zsh root  2>/dev/null || true

          cat > /etc/zsh/zshrc << 'ZSHRC'
          # KibaOS system-wide zshrc
          export LANG=en_US.UTF-8
          export EDITOR=nano

          HISTSIZE=10000
          SAVEHIST=10000
          HISTFILE=~/.zsh_history
          setopt SHARE_HISTORY
          setopt HIST_IGNORE_DUPS

          autoload -Uz compinit && compinit
          zstyle ':completion:*' menu select

          autoload -Uz vcs_info
          precmd() { vcs_info }
          PROMPT='%F{#bd93f9}%n@%m%f %F{#f8f8f2}%~%f %F{#bd93f9}❯%f '

          source /usr/share/zsh-autosuggestions/zsh-autosuggestions.zsh 2>/dev/null || true
          source /usr/share/zsh-syntax-highlighting/zsh-syntax-highlighting.zsh 2>/dev/null || true

          alias ls='ls --color=auto'
          alias ll='ls -lah'
          alias update='sudo apt update && sudo apt upgrade -y'
          alias install='sudo apt install'
          ZSHRC

          # ── Live user setup ───────────────────────────────────────────────

          if ! id -u user >/dev/null 2>&1; then
            useradd -m -s /bin/zsh -G sudo,audio,video,netdev,plugdev user
            echo "user:live" | chpasswd
          else
            usermod -s /bin/zsh user
          fi

          echo "user ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/live-user
          chmod 440 /etc/sudoers.d/live-user

          # ── Disable sleep / suspend ───────────────────────────────────────
          mkdir -p /etc/systemd/sleep.conf.d
          cat > /etc/systemd/sleep.conf.d/nosleep.conf << 'NOSLEEP'
          [Sleep]
          AllowSuspend=no
          AllowHibernation=no
          AllowHybridSleep=no
          AllowSuspendThenHibernate=no
          NOSLEEP

          mkdir -p /etc/skel/.config
          cat > /etc/skel/.config/powermanagementprofilesrc << 'POWERRC'
          [AC][DPMSControl]
          idleTime=0
          lockBeforeSleep=false
          turnOffDisplayWhenIdle=false

          [AC][HandleButtonEvents]
          lidAction=0
          powerButtonAction=0
          powerDownAction=0

          [AC][SuspendAndShutdown]
          autoSuspend=false
          autoSuspendAction=0
          autoSuspendIdleTime=0
          POWERRC

          # ─────────────────────────────────────────────────────────────────
          # ── THEMING SECTION ───────────────────────────────────────────────
          # Order: Theme → Wallpaper → Icons (Kora) → Cursor (Vimix)
          # Everything done via config files / /etc/skel placement.
          # No qdbus/lookandfeeltool commands used — pure INI config files.
          # ─────────────────────────────────────────────────────────────────

          # ── A. Install Ant-Dark KDE plasma desktop theme ──────────────────
          # Ant-Dark by EliverLara — a dark vibrant plasma style.
          # KDE Store: https://store.kde.org/p/1464285
          # Installed system-wide to /usr/share/plasma/desktoptheme/
          mkdir -p /usr/share/plasma/desktoptheme/ant-dark
          git clone --depth=1 https://github.com/EliverLara/Ant-Themes \
            /tmp/ant-themes 2>/dev/null || true

          # Ant-Themes repo has Plasma and KDE colour scheme subfolders.
          # If the git clone succeeded, install the plasma theme.
          if [ -d /tmp/ant-themes/Plasma/Ant-Dark ]; then
            cp -r /tmp/ant-themes/Plasma/Ant-Dark/. \
              /usr/share/plasma/desktoptheme/ant-dark/
          fi

          # Fallback: create a minimal Ant-Dark metadata.json that
          # inherits from breeze-dark so the theme name is registered.
          if [ ! -f /usr/share/plasma/desktoptheme/ant-dark/metadata.json ]; then
            cat > /usr/share/plasma/desktoptheme/ant-dark/metadata.json << 'ANTMETA'
          {
            "KPlugin": {
              "Authors": [ { "Name": "EliverLara", "Email": "" } ],
              "Category": "",
              "Description": "Ant Dark — a vibrant dark KDE Plasma style",
              "EnabledByDefault": true,
              "Id": "ant-dark",
              "License": "GPL",
              "Name": "Ant Dark",
              "Version": "1.0",
              "Website": "https://store.kde.org/p/1464285"
            },
            "X-Plasma-API": "5.0"
          }
          ANTMETA
          fi

          # Also install the Ant-Dark colour scheme
          mkdir -p /usr/share/color-schemes
          if [ -f /tmp/ant-themes/colors/Ant-Dark.colors ]; then
            cp /tmp/ant-themes/colors/Ant-Dark.colors \
              /usr/share/color-schemes/AntDark.colors
          fi
          rm -rf /tmp/ant-themes

          # ── B. Install Watch_Dogs KDE splash screen ───────────────────────
          # KDE Store: https://store.kde.org/p/1417004
          # Splash screens live in /usr/share/plasma/look-and-feel/<id>/contents/splash
          # We create the package structure manually (no network install possible
          # at build time without the KDE store API).
          # The splash is registered as a standalone look-and-feel package so
          # ksplashqml can find it.
          mkdir -p /usr/share/plasma/look-and-feel/com.kibaos.watchdogs.desktop/contents/splash/images

          cat > /usr/share/plasma/look-and-feel/com.kibaos.watchdogs.desktop/metadata.json << 'WATCHMETA'
          {
            "KPlugin": {
              "Authors": [ { "Name": "KibaOS" } ],
              "Description": "Watch_Dogs style KDE splash screen",
              "Id": "com.kibaos.watchdogs.desktop",
              "Name": "Watch Dogs",
              "Version": "1.0",
              "License": "GPL"
            }
          }
          WATCHMETA

          # Splash QML — dark cyan hacker aesthetic
          cat > /usr/share/plasma/look-and-feel/com.kibaos.watchdogs.desktop/contents/splash/Splash.qml << 'WATCHSPLASH'
          import QtQuick 2.15
          import QtQuick.Window 2.15

          Image {
              id: root
              source: "images/background.png"
              fillMode: Image.PreserveAspectCrop

              property int stage: 0

              Rectangle {
                  anchors.fill: parent
                  color: "#0a0a0a"
                  opacity: 0.85
              }

              Text {
                  anchors.centerIn: parent
                  text: "KibaOS"
                  font.pixelSize: 48
                  font.bold: true
                  color: "#00e5ff"
                  style: Text.Outline
                  styleColor: "#003344"
              }

              Text {
                  anchors.horizontalCenter: parent.horizontalCenter
                  anchors.bottom: parent.bottom
                  anchors.bottomMargin: 60
                  text: "Loading..."
                  font.pixelSize: 16
                  color: "#00bcd4"
              }
          }
          WATCHSPLASH

          # ── C. Install Kora icon theme ────────────────────────────────────
          # Kora by bikass — SVG icon theme, dark variant.
          # Installs to /usr/share/icons/kora
          mkdir -p /usr/share/icons
          git clone --depth=1 https://github.com/bikass/kora.git /tmp/kora 2>/dev/null || true
          if [ -d /tmp/kora/kora ]; then
            cp -r /tmp/kora/kora /usr/share/icons/kora
            # Update icon cache
            gtk-update-icon-cache -f /usr/share/icons/kora 2>/dev/null || true
          fi
          rm -rf /tmp/kora

          # ── D. Install Vimix cursors ──────────────────────────────────────
          # Vimix cursors by vinceliuice — sleek monochrome cursors.
          # Pre-built cursors are in the dist/ folder of the repo.
          git clone --depth=1 https://github.com/vinceliuice/Vimix-cursors.git \
            /tmp/vimix-cursors 2>/dev/null || true
          if [ -d /tmp/vimix-cursors ]; then
            # The repo ships pre-built cursor packages in dist/
            if [ -d /tmp/vimix-cursors/dist/Vimix-cursors ]; then
              cp -r /tmp/vimix-cursors/dist/Vimix-cursors \
                /usr/share/icons/Vimix-cursors
            fi
            if [ -d /tmp/vimix-cursors/dist/Vimix-white-cursors ]; then
              cp -r /tmp/vimix-cursors/dist/Vimix-white-cursors \
                /usr/share/icons/Vimix-white-cursors
            fi
            # If dist/ doesn't exist, try installing via script
            if [ ! -d /usr/share/icons/Vimix-cursors ]; then
              cd /tmp/vimix-cursors
              ./install.sh 2>/dev/null || true
              # Move from default install location if needed
              [ -d ~/.local/share/icons/Vimix-cursors ] && \
                mv ~/.local/share/icons/Vimix-cursors /usr/share/icons/ || true
            fi
            cd /
          fi
          rm -rf /tmp/vimix-cursors

          # ── E. Dracula color scheme (kept from original) ──────────────────
          mkdir -p /usr/share/color-schemes
          cat > /usr/share/color-schemes/Dracula.colors << 'DRACULA_COLORS'
          [ColorEffects:Disabled]
          ChangeSelectionColor=true
          Color=56,56,56
          ColorAmount=0
          ColorEffect=0
          ContrastAmount=0.65
          ContrastEffect=1
          IntensityAmount=0.1
          IntensityEffect=2

          [ColorEffects:Inactive]
          ChangeSelectionColor=true
          Color=112,111,110
          ColorAmount=0.025
          ColorEffect=2
          ContrastAmount=0.1
          ContrastEffect=2
          Enable=false
          IntensityAmount=0
          IntensityEffect=0

          [Colors:Button]
          BackgroundAlternate=68,71,90
          BackgroundNormal=68,71,90
          DecorationFocus=189,147,249
          DecorationHover=189,147,249
          ForegroundActive=189,147,249
          ForegroundInactive=98,114,164
          ForegroundLink=139,233,253
          ForegroundNegative=255,85,85
          ForegroundNeutral=241,250,140
          ForegroundNormal=248,248,242
          ForegroundPositive=80,250,123
          ForegroundVisited=255,121,198

          [Colors:Complementary]
          BackgroundAlternate=40,42,54
          BackgroundNormal=40,42,54
          DecorationFocus=189,147,249
          DecorationHover=189,147,249
          ForegroundActive=189,147,249
          ForegroundInactive=98,114,164
          ForegroundLink=139,233,253
          ForegroundNegative=255,85,85
          ForegroundNeutral=241,250,140
          ForegroundNormal=248,248,242
          ForegroundPositive=80,250,123
          ForegroundVisited=255,121,198

          [Colors:Header]
          BackgroundAlternate=40,42,54
          BackgroundNormal=40,42,54
          DecorationFocus=189,147,249
          DecorationHover=189,147,249
          ForegroundActive=189,147,249
          ForegroundInactive=98,114,164
          ForegroundLink=139,233,253
          ForegroundNegative=255,85,85
          ForegroundNeutral=241,250,140
          ForegroundNormal=248,248,242
          ForegroundPositive=80,250,123
          ForegroundVisited=255,121,198

          [Colors:Selection]
          BackgroundAlternate=68,71,90
          BackgroundNormal=189,147,249
          DecorationFocus=189,147,249
          DecorationHover=189,147,249
          ForegroundActive=248,248,242
          ForegroundInactive=98,114,164
          ForegroundLink=139,233,253
          ForegroundNegative=255,85,85
          ForegroundNeutral=241,250,140
          ForegroundNormal=40,42,54
          ForegroundPositive=80,250,123
          ForegroundVisited=255,121,198

          [Colors:Tooltip]
          BackgroundAlternate=68,71,90
          BackgroundNormal=40,42,54
          DecorationFocus=189,147,249
          DecorationHover=189,147,249
          ForegroundActive=189,147,249
          ForegroundInactive=98,114,164
          ForegroundLink=139,233,253
          ForegroundNegative=255,85,85
          ForegroundNeutral=241,250,140
          ForegroundNormal=248,248,242
          ForegroundPositive=80,250,123
          ForegroundVisited=255,121,198

          [Colors:View]
          BackgroundAlternate=40,42,54
          BackgroundNormal=40,42,54
          DecorationFocus=189,147,249
          DecorationHover=189,147,249
          ForegroundActive=189,147,249
          ForegroundInactive=98,114,164
          ForegroundLink=139,233,253
          ForegroundNegative=255,85,85
          ForegroundNeutral=241,250,140
          ForegroundNormal=248,248,242
          ForegroundPositive=80,250,123
          ForegroundVisited=255,121,198

          [Colors:Window]
          BackgroundAlternate=68,71,90
          BackgroundNormal=40,42,54
          DecorationFocus=189,147,249
          DecorationHover=189,147,249
          ForegroundActive=189,147,249
          ForegroundInactive=98,114,164
          ForegroundLink=139,233,253
          ForegroundNegative=255,85,85
          ForegroundNeutral=241,250,140
          ForegroundNormal=248,248,242
          ForegroundPositive=80,250,123
          ForegroundVisited=255,121,198

          [General]
          ColorScheme=Dracula
          Name=Dracula
          shadeSortColumn=true

          [KDE]
          contrast=4
          DRACULA_COLORS

          # ── F. Konsole Dracula color scheme ───────────────────────────────
          mkdir -p /usr/share/konsole
          cat > /usr/share/konsole/Dracula.colorscheme << 'KONSOLE_COLORS'
          [Background]
          Color=40,42,54

          [BackgroundFaint]
          Color=40,42,54

          [BackgroundIntense]
          Color=40,42,54

          [Color0]
          Color=40,42,54

          [Color0Faint]
          Color=40,42,54

          [Color0Intense]
          Color=68,71,90

          [Color1]
          Color=255,85,85

          [Color1Faint]
          Color=255,85,85

          [Color1Intense]
          Color=255,85,85

          [Color2]
          Color=80,250,123

          [Color2Faint]
          Color=80,250,123

          [Color2Intense]
          Color=80,250,123

          [Color3]
          Color=241,250,140

          [Color3Faint]
          Color=241,250,140

          [Color3Intense]
          Color=241,250,140

          [Color4]
          Color=189,147,249

          [Color4Faint]
          Color=189,147,249

          [Color4Intense]
          Color=189,147,249

          [Color5]
          Color=255,121,198

          [Color5Faint]
          Color=255,121,198

          [Color5Intense]
          Color=255,121,198

          [Color6]
          Color=139,233,253

          [Color6Faint]
          Color=139,233,253

          [Color6Intense]
          Color=139,233,253

          [Color7]
          Color=248,248,242

          [Color7Faint]
          Color=248,248,242

          [Color7Intense]
          Color=248,248,242

          [Foreground]
          Color=248,248,242

          [ForegroundFaint]
          Color=98,114,164

          [ForegroundIntense]
          Color=248,248,242

          [General]
          Anchor=0.5,0.5
          Blur=false
          ColorRandomization=false
          Description=Dracula
          FillStyle=Tile
          Opacity=0.95
          Wallpaper=
          KONSOLE_COLORS

          # ── G. Konsole default profile pointing at Dracula ─────────────────
          mkdir -p /etc/skel/.local/share/konsole
          cat > /etc/skel/.local/share/konsole/KibaOS.profile << 'KONSOLE_PROFILE'
          [Appearance]
          ColorScheme=Dracula
          Font=Monospace,11,-1,5,50,0,0,0,0,0

          [General]
          Command=/bin/zsh
          Name=KibaOS
          Parent=FALLBACK/
          TerminalColumns=100
          TerminalRows=30

          [Scrolling]
          ScrollBarPosition=2
          KONSOLE_PROFILE

          cat > /etc/skel/.local/share/konsole/konsolerc << 'KONSOLERC'
          [Desktop Entry]
          DefaultProfile=KibaOS.profile
          KONSOLERC

          # ─────────────────────────────────────────────────────────────────
          # ── H. KDE global settings: theme → wallpaper → icons ─────────────
          # Applied via /etc/xdg/ (system default) AND /etc/skel/.config/
          # (user home). Plasma 5.24+ respects LookAndFeelPackage in
          # /etc/xdg/kdeglobals for new users automatically.
          # ─────────────────────────────────────────────────────────────────

          SKEL_KDE=/etc/skel/.config
          mkdir -p "$SKEL_KDE"
          mkdir -p /etc/xdg

          # H-1. /etc/xdg/kdeglobals — system-wide default theme trigger.
          # Plasma reads LookAndFeelPackage from here on first login.
          cat > /etc/xdg/kdeglobals << 'XDG_KDEGLOBALS'
          [KDE]
          LookAndFeelPackage=org.kde.breezedark.desktop
          SingleClick=false
          contrast=4

          [Icons]
          Theme=kora

          [General]
          ColorScheme=Dracula
          widgetStyle=Breeze
          shadeSortColumn=true
          XCURSOR_THEME=Vimix-cursors
          XCURSOR_SIZE=24
          XDG_KDEGLOBALS

          # H-2. Per-user kdeglobals in skel (takes effect on first login,
          # covers: 1. Ant-Dark plasma style  2. Dracula colour scheme
          #         3. Kora icons             4. Vimix cursors
          #         5. Watch_Dogs splash      6. Breeze-Dark Look&Feel base)
          cat > "$SKEL_KDE/kdeglobals" << 'KDEGLOBALS'
          [ColorEffects:Disabled]
          ChangeSelectionColor=true
          Color=56,56,56
          ColorAmount=0
          ColorEffect=0
          ContrastAmount=0.65
          ContrastEffect=1
          IntensityAmount=0.1
          IntensityEffect=2

          [ColorEffects:Inactive]
          Enable=false

          [Colors:Button]
          BackgroundAlternate=68,71,90
          BackgroundNormal=68,71,90
          DecorationFocus=189,147,249
          DecorationHover=189,147,249
          ForegroundNormal=248,248,242
          ForegroundInactive=98,114,164
          ForegroundActive=189,147,249
          ForegroundLink=139,233,253
          ForegroundNegative=255,85,85
          ForegroundNeutral=241,250,140
          ForegroundPositive=80,250,123
          ForegroundVisited=255,121,198

          [Colors:Selection]
          BackgroundNormal=189,147,249
          BackgroundAlternate=68,71,90
          ForegroundNormal=40,42,54
          ForegroundInactive=98,114,164
          ForegroundActive=248,248,242

          [Colors:View]
          BackgroundNormal=40,42,54
          BackgroundAlternate=40,42,54
          ForegroundNormal=248,248,242
          ForegroundInactive=98,114,164
          ForegroundActive=189,147,249
          ForegroundLink=139,233,253
          ForegroundNegative=255,85,85
          ForegroundNeutral=241,250,140
          ForegroundPositive=80,250,123
          ForegroundVisited=255,121,198
          DecorationFocus=189,147,249
          DecorationHover=189,147,249

          [Colors:Window]
          BackgroundNormal=40,42,54
          BackgroundAlternate=68,71,90
          ForegroundNormal=248,248,242
          ForegroundInactive=98,114,164
          ForegroundActive=189,147,249
          ForegroundLink=139,233,253
          ForegroundNegative=255,85,85
          ForegroundNeutral=241,250,140
          ForegroundPositive=80,250,123
          ForegroundVisited=255,121,198
          DecorationFocus=189,147,249
          DecorationHover=189,147,249

          [Colors:Tooltip]
          BackgroundNormal=40,42,54
          BackgroundAlternate=68,71,90
          ForegroundNormal=248,248,242

          [Colors:Complementary]
          BackgroundNormal=40,42,54
          BackgroundAlternate=40,42,54
          ForegroundNormal=248,248,242

          [Colors:Header]
          BackgroundNormal=40,42,54
          BackgroundAlternate=40,42,54
          ForegroundNormal=248,248,242

          [General]
          ColorScheme=Dracula
          Name=Dracula
          widgetStyle=Breeze
          shadeSortColumn=true

          [Icons]
          Theme=kora

          [KDE]
          LookAndFeelPackage=org.kde.breezedark.desktop
          SingleClick=false
          contrast=4

          [WM]
          activeBackground=40,42,54
          activeBlend=189,147,249
          activeForeground=248,248,242
          activeFrame=40,42,54
          inactiveBackground=40,42,54
          inactiveBlend=68,71,90
          inactiveForeground=98,114,164
          inactiveFrame=40,42,54
          KDEGLOBALS

          # H-3. plasmarc — set Ant-Dark plasma style (desktop theme)
          cat > "$SKEL_KDE/plasmarc" << 'PLASMARC'
          [Theme]
          name=ant-dark

          [PlasmaTabletMode]
          TabletMode=off
          PLASMARC

          # H-4. ksplashrc — set Watch_Dogs splash screen
          cat > "$SKEL_KDE/ksplashrc" << 'KSPLASHRC'
