name: YAML Lint

on:
  push:
    paths:
      - "**/*.yml"
      - "**/*.yaml"
  pull_request:
    paths:
      - "**/*.yml"
      - "**/*.yaml"

jobs:
  yamllint:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .github/linters/.yaml-lint.yml
          file_or_dir: .
          # pnpm-lock.yaml is valid YAML but often conflicts with specific lint rules
          # and is auto-generated, so we exclude it.
          # We also exclude node_modules.
          # The action supports a shell-style glob or a space-separated list.
          # However, the underlying tool often handles exclusions better in the config file.
