  check-signoff:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Check for Signed-off-by
        run: |
          commits=$(git log origin/${{ github.base_ref }}..HEAD --format=%B)
          if ! echo "$commits" | grep -q "Signed-off-by:"; then
            echo "Error: All commits must include a 'Signed-off-by:' line."
            exit 1
          fi
