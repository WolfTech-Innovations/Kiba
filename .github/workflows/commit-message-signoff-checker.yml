name: Commit Message Sign-off Checker

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-signoff:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Signed-off-by
        run: |
          commits=$(git log origin/${{ github.base_ref }}..HEAD --format=%B)
          if ! echo "$commits" | grep -q "Signed-off-by:"; then
            echo "Error: All commits must include a 'Signed-off-by:' line."
            exit 1
          fi
