  detect-duplicates:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Scan for Redundant Packages
        run: |
          sed -n '/PACKAGES/,/PACKAGES/p' .github/workflows/kiba.yml | grep -v "PACKAGES" | grep -v "^#" | grep -v "^$" | sort | uniq -d
