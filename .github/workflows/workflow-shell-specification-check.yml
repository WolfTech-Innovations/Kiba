name: Workflow Shell Spec Check
on:
  push:
    paths:
      - '.github/workflows/*.yml'
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Verify shell specification
        run: |
          grep -rn "shell: " .github/workflows/*.yml || echo "Notice: Workflows use default shell"
