name: Markdown Link Format Audit
on:
  push:
    paths:
      - '**.md'
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check for bare URLs
        run: |
          grep -rnE "http[s]?://[a-zA-Z0-9./?-]+" . --include="*.md" | grep -vE "\[.*\]\(http|src=|href=" && { echo "Error: Use Markdown link format for URLs"; exit 1; } || echo "Links are properly formatted"
