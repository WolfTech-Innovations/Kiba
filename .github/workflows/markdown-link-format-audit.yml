name: Markdown Link Format Audit
on:
  push:
    paths:
      - '**.md'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for bare URLs
        run: |
          # Audit Markdown files for bare URLs, excluding node_modules, code blocks, and legitimate link formats
          grep -rnE "http[s]?://[a-zA-Z0-9./?-]+" . --include="*.md" --exclude-dir="node_modules" | \
          grep -v "markdown-link-format-audit.yml" | \
          grep -vE "\[.*\]\(http|src=|href=|git clone http" && \
          { echo "Error: Use Markdown link format for URLs"; exit 1; } || echo "Links are properly formatted"
