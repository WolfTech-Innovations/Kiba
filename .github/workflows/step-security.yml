name: Step Security

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  harden-runner:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450
        with:
          egress-policy: audit # Change to 'block' after observing traffic
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
