name: Step Security

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  harden-runner:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit # Change to 'block' after observing traffic
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
