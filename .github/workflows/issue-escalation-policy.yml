name: Issue Escalation Policy

on:
  schedule:
    - cron: "0 0 * * *" # Daily
  workflow_dispatch:

jobs:
  escalate-issues:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'high priority'
            });

            const now = new Date();
            for (const issue of issues) {
              const created = new Date(issue.created_at);
              const diffDays = Math.ceil(Math.abs(now - created) / (1000 * 60 * 60 * 24));
              if (diffDays > 7) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: "🚨 This high-priority issue has been open for more than 7 days without resolution. Escalating for immediate attention."
                });
              }
            }
