name: Check logrotate Snippets
on:
  push:
    paths:
      - '**/logrotate.d/*'
  pull_request:
    paths:
      - '**/logrotate.d/*'
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate logrotate configs
        run: |
          set -euo pipefail
          find . -path "*/logrotate.d/*" -type f | while read -r file; do
            echo "Auditing $file..."
            logrotate -d "$file" || { echo "Error: logrotate validation failed for $file"; exit 1; }
          done
