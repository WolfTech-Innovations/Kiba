name: APT Source Validator

on:
  push:
    paths:
      - "build.sh"
      - ".github/workflows/kiba.yml"
  pull_request:

jobs:
  validate-apt:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for APT Source Issues
        run: |
          if grep -r "add-apt-repository" .; then
            echo "Found add-apt-repository, consider using gpg keys instead"
          fi
          if grep -r "curl.*gpg" .; then
            echo "Found GPG key download, verifying integrity..."
          fi
