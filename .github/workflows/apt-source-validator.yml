  push:
    timeout-minutes: 5
    paths:
      - "build.sh"
      - ".github/workflows/kiba.yml"
  pull_request:

jobs:
  validate-apt:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check for APT Source Issues
        run: |
          if grep -r "add-apt-repository" .; then
            echo "Found add-apt-repository, consider using gpg keys instead"
          fi
          if grep -r "curl.*gpg" .; then
            echo "Found GPG key download, verifying integrity..."
          fi
