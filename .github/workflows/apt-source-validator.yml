name: APT Source Validator

on:
  push:
    paths:
      - 'build.sh'
      - '.github/workflows/kiba.yml'
  pull_request:

jobs:
  validate-apt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for APT Source Issues
        run: |
          grep -r "add-apt-repository" . && echo "Found add-apt-repository, consider using gpg keys instead" || true
          grep -r "curl.*gpg" . && echo "Found GPG key download, verifying integrity..." || true
