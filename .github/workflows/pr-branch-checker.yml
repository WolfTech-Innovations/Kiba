name: PR Branch Checker

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Base Branch
        run: |
          if [[ "${{ github.base_ref }}" != "main" ]]; then
            echo "Pull requests must be made against the main branch."
            exit 1
          fi
      - name: Check Branch Name
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ ! $BRANCH_NAME =~ ^(feat|fix|doc|refactor|build|ci)/ ]]; then
            echo "Branch name '$BRANCH_NAME' does not follow conventions (feat/, fix/, etc.)"
            # exit 1 # Optional: don't fail, just warn
          fi
