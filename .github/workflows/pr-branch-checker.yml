name: PR Branch Checker

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Base Branch
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$BASE_REF" != "main" ]]; then
            echo "Pull requests must be made against the main branch."
          fi
      - name: Check Branch Name
        env:
          head_ref: ${{ github.head_ref }}
        run: |
          if [[ ! "$head_ref" =~ ^(feat|fix|doc|refactor|build|ci)/ ]]; then
            echo "Branch name '$head_ref' does not follow conventions (feat/, fix/, etc.)"
          fi
