name: Check SSHD Config
on:
  push:
    paths:
      - '**/sshd_config'
  pull_request:
    paths:
      - '**/sshd_config'
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate sshd_config
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y openssh-server
          find . -name "sshd_config" -not -path "./node_modules/*" | while read -r file; do
            echo "Auditing $file..."
            sshd -t -f "$file" || { echo "Error: SSHD config validation failed for $file"; exit 1; }
          done
