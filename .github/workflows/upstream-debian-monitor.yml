name: Upstream Debian Monitor

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  check-debian:
    runs-on: ubuntu-latest
    steps:
      - name: Check Trixie Status
        run: |
          STATUS=$(curl -s "https://api.ftp-master.debian.org/madison?package=plasma-desktop&dist=trixie")
          if [[ -z "$STATUS" ]]; then
            echo "Warning: Could not fetch Debian Trixie status"
          else
            echo "Current Plasma Desktop version in Trixie:"
            echo "$STATUS"
          fi
