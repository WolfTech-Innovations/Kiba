name: Workflow Step Name Requirement
on:
  push:
    paths:
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'
jobs:
  check-step-names:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for unnamed steps
        run: |
          for file in .github/workflows/*.yml; do
            # Use yq to check if all steps have a name
            unnamed=$(yq '.jobs | to_entries | map(.value.steps) | flatten | select(. != null and .name == null) | length' "$file")
            if [ "$unnamed" -gt 0 ]; then
              echo "Error: $file contains steps without a 'name'."
              exit 1
            fi
          done
          echo "All steps have names"
