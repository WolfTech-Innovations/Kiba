name: Workflow Step Name Requirement
on:
  push:
    paths:
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'
jobs:
  check-step-names:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Scan for unnamed steps
        run: |
          for file in .github/workflows/*.yml; do
            unnamed=$(yq '.jobs | to_entries | .[] | .value.steps | .[] | select(.name == null) | .uses // .run' "$file")
            if [ -n "$unnamed" ]; then
              echo "Error: $file contains steps without a 'name': $unnamed"
              exit 1
            fi
          done
          echo "All steps have names"
