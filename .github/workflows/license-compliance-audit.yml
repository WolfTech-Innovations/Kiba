  schedule:
    timeout-minutes: 5
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  audit-licenses:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Scan build hooks for URLs
        run: |
          grep -oE "https?://[a-zA-Z0-9./_-]+" .github/workflows/kiba.yml | sort -u
          echo "Auditing third-party source URLs for license compliance..."
