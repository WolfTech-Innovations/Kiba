name: Lock Threads

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  lock:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      name: Run dessant/lock-threads
      - uses: dessant/lock-threads@v5
        with:
          issue-inactive-days: "90"
          pr-inactive-days: "90"
