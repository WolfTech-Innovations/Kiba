name: Lock Threads

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  lock:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: dessant/lock-threads@1bf7ec25051fe7c00bdd17e6a7cf3d7bfb7dc771
        with:
          issue-inactive-days: "90"
          pr-inactive-days: "90"
