name: Doc Spelling Common Mistakes
on:
  push:
    paths:
      - '**.md'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for common misspellings
        run: |
          PATTERN="teh""|recieve""|occured"""
          grep -rnEi "$PATTERN" . --exclude=".github/workflows/doc-spelling-common-mistakes.yml" --exclude-dir=".git" && { echo "Error: Common misspellings found"; exit 1; } || echo "No common mistakes found"
