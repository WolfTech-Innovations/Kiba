name: Doc Spelling Common Mistakes
on:
  push:
    paths:
      - '**.md'
jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check for common misspellings
        run: |
          grep -rnEi "t[e]h|r[e]cieve|occ[u]red" . --exclude="doc-spelling-common-mistakes.yml" && { echo "Error: Common misspellings found"; exit 1; } || echo "No common mistakes found"
