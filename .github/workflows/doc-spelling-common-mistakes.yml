name: Doc Spelling Common Mistakes
on:
  push:
    paths:
      - '**.md'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check for common misspellings
        run: |
          grep -rnEi "the|receive|occurred" . && { echo "Error: Common misspellings found"; exit 1; } || echo "No common mistakes found"
