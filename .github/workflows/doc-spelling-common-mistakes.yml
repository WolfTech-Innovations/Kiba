name: Doc Spelling Common Mistakes
on:
  push:
    paths:
      - '**.md'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for common misspellings
        run: |
          grep -rnEi "teh|recieve|occured" . | grep -v "doc-spelling-common-mistakes.yml" && { echo "Error: Common misspellings found"; exit 1; } || echo "No common mistakes found"
