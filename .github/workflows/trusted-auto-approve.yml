name: Trusted Auto-Approve

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'christopherfoxjr' ||
      github.event.pull_request.user.login == 'google-lab-jules[bot]' ||
      github.event.pull_request.user.login == 'google-lab-jules'
    steps:
      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
