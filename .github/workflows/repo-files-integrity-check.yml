name: Repo Files Integrity Check

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"

jobs:
  check-integrity:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify Essential Files
        run: |
          ESSENTIAL_FILES="README.md LICENSE WIKI.md ACKNOWLEDGMENTS.md package.json"
          for file in $ESSENTIAL_FILES; do
            if [ ! -s "$file" ]; then
              echo "::error::Critical file $file is missing or empty!"
              exit 1
            fi
          done
