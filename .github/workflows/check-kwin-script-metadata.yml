name: Check KWin Script Metadata
on:
  push:
    paths:
      - '**/kwin/scripts/**/metadata.json'
  pull_request:
    paths:
      - '**/kwin/scripts/**/metadata.json'
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate KWin script metadata
        run: |
          set -euo pipefail
          find . -name "metadata.json" -path "*/kwin/scripts/*" | while read -r file; do
            echo "Auditing $file..."
            FILE="$file" python3 -c "import os, json; d=json.load(open(os.environ['FILE'])); assert 'KPlugin' in d" || { echo "Error: Invalid KWin metadata in $file"; exit 1; }
          done
