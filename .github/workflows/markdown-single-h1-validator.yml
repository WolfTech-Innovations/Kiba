name: Markdown Single H1 Validator
on:
  push:
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'
jobs:
  validate-h1:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Check for single H1 per file
        run: |
          find . -name "*.md" -not -path "./node_modules/*" | while read -r file; do
            h1_count=$(grep -c "^# " "$file")
            if [ "$h1_count" -ne 1 ]; then
              echo "Error: $file must have exactly one H1 header (found $h1_count)"
              exit 1
            fi
          done
          echo "All Markdown files have exactly one H1"
