name: Workflow Timeout Minutes Check
on:
  push:
    paths:
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'
jobs:
  check-timeout:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan for missing timeout-minutes
        run: |
          for file in .github/workflows/*.yml; do
            missing=$(yq '.jobs | to_entries | .[] | select(.value.steps != null and .value["timeout-minutes"] == null) | .key' "$file")
            if [ -n "$missing" ]; then
              echo "Error: $file contains jobs missing 'timeout-minutes': $missing"
              exit 1
            fi
          done
          echo "All jobs have timeout-minutes defined"
