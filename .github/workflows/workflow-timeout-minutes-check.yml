name: Workflow Timeout Minutes Check
on:
  push:
    paths:
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'
jobs:
  check-timeout:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        run: |
          set -euo pipefail
          for file in .github/workflows/*.yml; do
            if [ -n "$missing" ]; then
              exit 1
            fi
          done
