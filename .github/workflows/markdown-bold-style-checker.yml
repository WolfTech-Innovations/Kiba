name: Markdown Bold Style Checker
on:
  push:
    paths:
      - '**.md'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Enforce double asterisk bold
        run: |
          grep -rnE "__[a-zA-Z0-9]+__" . && { echo "Error: Use ** for bold instead of __"; exit 1; } || echo "Bold style is consistent"
