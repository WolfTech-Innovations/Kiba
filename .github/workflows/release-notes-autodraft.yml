name: Release Notes Autodraft

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  draft-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

      - name: Save Release Notes to Notes folder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/save_release_notes.sh ${{ steps.create_release.outputs.id }}
