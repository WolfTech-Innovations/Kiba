name: Release Notes Autodraft

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  draft-notes:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: create_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.1.0
        with:
          draft: true
          generate_release_notes: true

      - name: Save Release Notes to Notes folder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.create_release.outputs.id }}
        run: ./scripts/save_release_notes.sh "$RELEASE_ID"
