name: Release Notes Autodraft

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  draft-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

      - name: Save Release Notes to Notes folder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generate filename: NTE-DDHYM
          # DD: Day of month (01-31)
          # H: Hour of day (0-N for 0-23)
          # Y: Last digit of year
          # M: Month (1-C for 1-12)

          DD=$(date +%d)

          H_VAL=$(date +%-H)
          HOURS="0123456789ABCDEFGHIJKLMN"
          H=$(echo $HOURS | cut -c $((H_VAL + 1)))

          Y=$(date +%y | cut -c 2)

          M_VAL=$(date +%-m)
          MONTHS="123456789ABC"
          M=$(echo $MONTHS | cut -c $M_VAL)

          FILENAME="Notes/NTE-${DD}${H}${Y}${M}.md"

          mkdir -p Notes
          # Fetch release body using GitHub CLI
          gh release view ${{ github.ref_name }} --template '{{.body}}' > "$FILENAME"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILENAME"
          git commit -m "docs: add release notes $FILENAME [skip ci]"
          git pull --rebase origin main
          git push origin main
