name: Release Notes Autodraft

on:
  push:
    tags:
      - 'v*'

jobs:
  draft-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Release Notes
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
