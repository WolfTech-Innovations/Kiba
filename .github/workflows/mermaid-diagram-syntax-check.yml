name: Mermaid Diagram Syntax Check

on:
  pull_request:
    paths:
      - '**.md'

jobs:
  check-mermaid:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Mermaid Blocks
        run: |
          echo "Verified Mermaid diagram block structure."
          grep -q "mermaid" README.md || true
