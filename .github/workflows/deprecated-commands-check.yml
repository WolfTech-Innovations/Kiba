name: Deprecated Commands Check

on:
  push:
    paths:
      - "**.sh"
      - ".github/workflows/*.yml"
  pull_request:
    paths:
      - "**.sh"
      - ".github/workflows/*.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Scan for deprecated commands
        run: |
          # Check for deprecated networking and package commands
          # We exclude this file itself and documentation
          grep -rnE "apt-get|ifconfig|netstat" . --exclude-dir=".git" --exclude="deprecated-commands-check.yml" --exclude="shell-checkbashisms-audit.yml" --exclude="*.md" && { echo "Error: Use apt, ip, or ss instead of deprecated commands"; exit 1; } || echo "No deprecated commands found"
