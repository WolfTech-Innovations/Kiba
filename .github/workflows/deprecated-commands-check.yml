name: Deprecated Commands Check
on:
  push:
    paths:
      - '**.sh'
      - '.github/workflows/*.yml'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for deprecated commands
        run: |
          # Use empty string concatenation to hide the pattern from this script itself
          P1="apt""-get"
          P2="if""config"
          P3="net""stat"
          grep -rnE "$P1|$P2|$P3" . \
            --exclude=".github/workflows/deprecated-commands-check.yml" \
            --exclude-dir=".git" \
            --exclude-dir="docs" \
            --exclude-dir="config" \
            --exclude-dir="node_modules" \
            && { echo "Error: Use apt, ip, or ss instead of deprecated commands"; exit 1; } || echo "No deprecated commands found"
