name: Deprecated Commands Check

on:
  push:
    paths:
      - "**.sh"
      - ".github/workflows/*.yml"
  pull_request:
    paths:
      - "**.sh"
      - ".github/workflows/*.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Scan for deprecated commands
        run: |
          # Use grep to find deprecated commands, excluding the workflow file itself
          # and the software-management.md documentation which mentions it legitimately.
          if grep -rnE "apt-get|ifconfig|netstat" . | grep -vE "\.github/workflows/deprecated-commands-check\.yml|docs/software-management\.md"; then
            echo "Error: Use apt, ip, or ss instead of deprecated commands"
            exit 1
          fi
          echo "No deprecated commands found"
