name: Deprecated Commands Check
on:
  push:
    paths:
      - '**.sh'
      - '.github/workflows/*.yml'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Scan for deprecated commands
        run: |
          grep -rnE "apt|ifconfig|netstat" . && { echo "Error: Use apt, ip, or ss instead of deprecated commands"; exit 1; } || echo "No deprecated commands found"
