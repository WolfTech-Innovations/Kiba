name: Deprecated Commands Check
on:
  push:
    paths:
      - '**.sh'
      - '.github/workflows/*.yml'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for deprecated commands
        run: |
          grep -rnE "apt-get|ifconfig|netstat" . | grep -vE "deprecated-commands-check.yml|kiba.yml|docker-test.yml|software-management.md" && { echo "Error: Use apt, ip, or ss instead of deprecated commands"; exit 1; } || echo "No deprecated commands found"
