  push:
    timeout-minutes: 5
    paths:
      - 'README.md'
jobs:
  check-section:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify contribution section
        run: |
          grep -qi "contributing" README.md || { echo "README missing Contributing section"; exit 1; }
