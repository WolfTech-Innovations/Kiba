name: GH Actions Deprecated Commands
on:
  push:
    paths:
      - '.github/workflows/*.yml'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for set-output
        run: |
          PATTERN="::set""-output"
          grep -r "$PATTERN" .github/workflows/*.yml --exclude=".github/workflows/github-actions-deprecated-commands.yml" && { echo "Error: ::set-output is deprecated, use GITHUB_OUTPUT"; exit 1; } || echo "No deprecated GITHUB_OUTPUT usage"
