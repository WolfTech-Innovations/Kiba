name: GH Actions Deprecated Commands
on:
  push:
    paths:
      - '.github/workflows/*.yml'
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan for set-output
        run: |
          grep -r "::set-output" .github/workflows/*.yml | grep -v "github-actions-deprecated-commands.yml" && { echo "Error: ::set-output is deprecated, use GITHUB_OUTPUT"; exit 1; } || echo "No deprecated GITHUB_OUTPUT usage"
