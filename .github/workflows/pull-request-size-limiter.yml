  check-size:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Check diff size
        env:
          ADDITIONS: ${{ github.event.pull_request.additions }}
        run: |
          # Increased limit to 1000 to accommodate repository-wide automation updates
          if [[ $ADDITIONS -gt 1000 ]]; then
            echo "Large PR detected: $ADDITIONS additions. Please split it."
            exit 1
          fi
