  push:
    timeout-minutes: 5
    paths:
      - '.github/workflows/kiba.yml'
  workflow_dispatch:

jobs:
  check-alias-collision:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check for duplicate aliases in zshrc
        run: |
          grep "alias " .github/workflows/kiba.yml | grep -oE "alias [^=]+" | sort | uniq -d | grep . && { echo "Error: Duplicate alias definitions found in kiba.yml"; exit 1; }
          echo "No alias collisions found."
