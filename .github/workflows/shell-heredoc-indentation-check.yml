name: Shell Heredoc Indentation Check
on:
  push:
    paths:
      - '**.sh'
  pull_request:
    paths:
      - '**.sh'
jobs:
  check-heredoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for unindented heredocs
        run: |
          find . -name "*.sh" -not -path "./node_modules/*" | xargs -r grep -l "<<[A-Z]" | grep -v "<<-" && echo "Recommendation: Use '<<-' to allow tabs for indentation in heredocs." || echo "Heredoc usage looks good"
