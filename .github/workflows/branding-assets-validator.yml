name: Branding Assets Validator

on:
  push:
    paths:
      - "branding/**/*"
  pull_request:
    paths:
      - "branding/**/*"

jobs:
  validate:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check Image Existence
        run: |
          ls branding/kibaos_banner.png || exit 1
      - name: Verify Image Formats
        run: |
          find branding -type f -name "*.png" -exec file {} + | grep "PNG image data"
