  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.pull_request.user.login, 'jules') &&
      github.event.pull_request.user.login != 'christopherfoxjr'
    steps:
      - uses: amannn/action-semantic-pull-request@0733d3288102b4d8d0179a19806463400a402373
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
