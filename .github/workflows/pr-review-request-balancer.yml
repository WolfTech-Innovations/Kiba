  check-reviewer-load:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const reviewer = context.payload.requested_reviewer.login;
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            const load = pulls.filter(p => p.requested_reviewers.some(r => r.login === reviewer)).length;
            if (load > 5) {
              console.log(`${reviewer} already has ${load} pending reviews. Consider tagging someone else!`);
            }
