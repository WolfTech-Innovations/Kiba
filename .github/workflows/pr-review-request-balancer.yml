name: PR Review Request Balancer

on:
  pull_request:
    types: [review_requested]

jobs:
  check-reviewer-load:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      name: Run actions/github-script
      - uses: actions/github-script@v7
        with:
          script: |
            const reviewer = context.payload.requested_reviewer.login;
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            const load = pulls.filter(p => p.requested_reviewers.some(r => r.login === reviewer)).length;
            if (load > 5) {
              console.log(`${reviewer} already has ${load} pending reviews. Consider tagging someone else!`);
            }
