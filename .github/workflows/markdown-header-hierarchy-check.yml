name: Markdown Header Hierarchy Check
on:
  push:
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'
jobs:
  check-hierarchy:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Verify header progression
        run: |
          find . -name "*.md" -not -path "./node_modules/*" | while read -r file; do
            grep "^#\{1,6\} " "$file" | sed 's/^\(#*\).*/\1/' | awk 'length($0) > prev + 1 && prev != 0 { exit 1 } { prev = length($0) }' || { echo "Error: Logical header jump detected in $file"; exit 1; }
          done
          echo "Header hierarchy is consistent"
