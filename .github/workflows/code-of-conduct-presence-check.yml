  push:
    timeout-minutes: 5
    branches: [main]
  workflow_dispatch:

jobs:
  check-coc:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683bd71901bbe5b1630ceea73d27597364c9af683
      - name: Verify CODE_OF_CONDUCT.md
        run: |
          if [ ! -f "CODE_OF_CONDUCT.md" ]; then
            echo "Warning: CODE_OF_CONDUCT.md is missing. It is highly recommended for community health."
          fi
