name: Code of Conduct Presence Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-coc:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Verify CODE_OF_CONDUCT.md
        run: |
          if [ ! -f "CODE_OF_CONDUCT.md" ]; then
            echo "Warning: CODE_OF_CONDUCT.md is missing. It is highly recommended for community health."
          fi
