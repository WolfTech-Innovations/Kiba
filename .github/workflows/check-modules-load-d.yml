name: Check modules-load.d
on:
  push:
    paths:
      - '**/modules-load.d/*.conf'
  pull_request:
    paths:
      - '**/modules-load.d/*.conf'
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate modules-load.d config
        run: |
          set -euo pipefail
          find . -name "*.conf" -path "*/modules-load.d/*" | while read -r file; do
            echo "Auditing $file..."
            # Each line should be a module name
            grep -v "^#" "$file" | grep -v "^$" | grep "[^a-zA-Z0-9_-]" && { echo "Error: Invalid module name in $file"; exit 1; } || true
          done
