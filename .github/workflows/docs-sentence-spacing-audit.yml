name: Docs Sentence Spacing Audit
on:
  push:
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'
jobs:
  audit-spacing:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check for double spaces after periods
        run: |
          set -euo pipefail
          # Find periods followed by exactly two spaces and then an uppercase letter
          grep -rnE "\.  [A-Z]" . --include="*.md" && { echo "Error: Use single space after periods."; exit 1; } || echo "Sentence spacing is correct."
