# Labeler configuration for actions/labeler@v5

branding:
  - changed-files:
      - any-glob-to-any-file: 'branding/**/*'

documentation:
  - changed-files:
      - any-glob-to-any-file: 'README.md'
      - any-glob-to-any-file: 'LICENSE'
      - any-glob-to-any-file: '**/*.md'

workflows:
  - changed-files:
      - any-glob-to-any-file: '.github/workflows/**/*'

automation:
  - changed-files:
      - any-glob-to-any-file: '.github/scripts/**/*'
      - any-glob-to-any-file: 'build.sh'

templates:
  - changed-files:
      - any-glob-to-any-file: '.github/ISSUE_TEMPLATE/**/*'
      - any-glob-to-any-file: '.github/PULL_REQUEST_TEMPLATE.md'
